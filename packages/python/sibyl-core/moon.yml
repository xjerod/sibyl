$schema: https://moonrepo.dev/schemas/project.json
toolchains:
  default: system
language: python
tasks:
  sync:
    command: uv sync
    inputs:
    - '@group(configs)'
  lint:
    command: uv run ruff check src/ tests/
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  format:
    command: uv run ruff format src/ tests/
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  fix:
    script: uv run ruff check --fix src/ tests/ && uv run ruff format src/ tests/
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    preset: server
  fix-all:
    script: uv run ruff check --fix --unsafe-fixes src/ tests/ && uv run ruff format src/ tests/
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    preset: server
  typecheck:
    command: uv run ty check src/
    inputs:
    - '@group(sources)'
  test:
    command: uv run pytest tests/ -v
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  memory-trust-policy-test:
    command: uv run pytest tests/test_memory_policy.py tests/test_native_memory.py -v
    inputs:
    - '@group(sources)'
    - tests/test_memory_policy.py
    - tests/test_native_memory.py
  memory-trust-context-test:
    command: uv run pytest tests/test_context_pack.py tests/test_session_bundle.py -v
    inputs:
    - '@group(sources)'
    - tests/test_context_pack.py
    - tests/test_session_bundle.py
  no-graphiti-smoke:
    command: uv run pytest tests/test_no_graphiti_default_loop.py -v
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  bench-retrieval:
    command: uv run pytest tests/test_retrieval_benchmarks.py -v
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  bench-live:
    command: uv run python ../../../benchmarks/live_runtime_eval.py
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  bench-context:
    command: uv run python ../../../benchmarks/context_pack_eval.py
    inputs:
    - /benchmarks/context_pack_eval.py
    - /benchmarks/context_pack_cases.json
    - '@group(sources)'
    - '@group(tests)'
  bench-live-smoke:
    command: SIBYL_LIVE_RETRIEVAL_TESTS=1 uv run pytest tests/test_retrieval_live.py -v -s
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  test-cov:
    command: uv run pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    outputs:
    - coverage.xml
  check:
    deps:
    - ~:lint
    - ~:typecheck
    - ~:test
tags:
- python
- library
- core
fileGroups:
  sources:
  - src/**/*.py
  tests:
  - tests/**/*.py
  configs:
  - pyproject.toml
  - moon.yml
layer: library
