$schema: https://moonrepo.dev/schemas/project.json
toolchains:
  default: system
language: python
tasks:
  sync:
    command: uv sync
    inputs:
    - '@group(configs)'
  lint:
    command: uv run ruff check src/ tests/
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  format:
    command: uv run ruff format src/ tests/
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  fix:
    script: uv run ruff check --fix src/ tests/ && uv run ruff format src/ tests/
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    preset: server
  fix-all:
    script: uv run ruff check --fix --unsafe-fixes src/ tests/ && uv run ruff format src/ tests/
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    preset: server
  typecheck:
    command: uv run ty check src/
    inputs:
    - '@group(sources)'
  test:
    command:
      uv run pytest tests/ -v
      -m "not legacy_graph_contract"
      --ignore=tests/graph/surreal
      --ignore=tests/test_graph_batch.py
      --ignore=tests/test_graph_client.py
      --ignore=tests/test_graph_entities.py
      --ignore=tests/test_graph_relationships.py
      --ignore=tests/test_graph_runtime_services.py
      --ignore=tests/test_log_safety.py
      --ignore=tests/test_migrate_archive.py
      --ignore=tests/test_search_interface.py
      --ignore=tests/test_surreal_authentication.py
      --ignore=tests/test_surreal_observability.py
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  legacy-graph-contract-test:
    deps:
    - ~:legacy-graph-contract-file-test
    - ~:legacy-graph-contract-marked-test
  legacy-graph-contract-file-test:
    command:
      uv run pytest
      tests/graph/surreal
      tests/test_graph_batch.py
      tests/test_graph_client.py
      tests/test_graph_entities.py
      tests/test_graph_relationships.py
      tests/test_graph_runtime_services.py
      tests/test_log_safety.py
      tests/test_migrate_archive.py
      tests/test_search_interface.py
      tests/test_surreal_authentication.py
      tests/test_surreal_observability.py
      -v
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  legacy-graph-contract-marked-test:
    command:
      uv run pytest
      tests/test_models.py
      tests/test_retrieval_advanced.py
      tests/test_tools_admin.py
      tests/test_tools_manage.py
      -m legacy_graph_contract
      -v
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  memory-trust-policy-test:
    command:
      uv run pytest tests/test_memory_policy.py tests/test_native_memory.py
      tests/test_memory_autonomy.py -v
    inputs:
    - '@group(sources)'
    - tests/test_memory_policy.py
    - tests/test_native_memory.py
    - tests/test_memory_autonomy.py
  autonomy-test:
    command: uv run pytest tests/test_memory_autonomy.py -v
    inputs:
    - '@group(sources)'
    - tests/test_memory_autonomy.py
  memory-trust-context-test:
    command: uv run pytest tests/test_context_pack.py tests/test_session_bundle.py -v
    inputs:
    - '@group(sources)'
    - tests/test_context_pack.py
    - tests/test_session_bundle.py
  context-quality-test:
    command:
      uv run pytest tests/test_context_pack.py tests/test_context_pack_evals.py
      tests/test_evals_runtime.py -v
    inputs:
    - '@group(sources)'
    - tests/test_context_pack.py
    - tests/test_context_pack_evals.py
    - tests/test_evals_runtime.py
    - /benchmarks/context_pack_cases.json
  reflection-quality-test:
    command:
      uv run pytest tests/test_reflection_models.py tests/test_reflection_extractor.py
      tests/test_reflect.py tests/test_native_memory.py tests/test_memory_autonomy.py
      tests/test_context_pack.py -v
    inputs:
    - '@group(sources)'
    - tests/test_reflection_models.py
    - tests/test_reflection_extractor.py
    - tests/test_reflect.py
    - tests/test_native_memory.py
    - tests/test_memory_autonomy.py
    - tests/test_context_pack.py
  synthesis-gate-test:
    command: uv run pytest tests/test_synthesis.py -v
    inputs:
    - '@group(sources)'
    - tests/test_synthesis.py
  synthesis-tool-gate-test:
    command:
      uv run pytest
      tests/test_tools.py::test_synthesis_plan_tool_materializes_section_sources
      tests/test_tools.py::test_synthesis_draft_tool_can_remember_artifact
      tests/test_tools.py::test_synthesis_verify_tool_reports_gaps_without_artifact
      -v
    inputs:
    - '@group(sources)'
    - tests/test_tools.py
  backup-restore-gate-test:
    command:
      uv run pytest
      tests/test_tools_admin.py::TestBackupInventory
      tests/test_tools_admin.py::TestRestoreBackup
      tests/test_migrate_archive.py
      -v
    inputs:
    - '@group(sources)'
    - tests/test_tools_admin.py
    - tests/test_migrate_archive.py
  adapter-ingest-contract-test:
    command: uv run pytest tests/test_source_adapters.py -v
    inputs:
    - '@group(sources)'
    - tests/test_source_adapters.py
  adapter-ingest-mailbox-test:
    command: uv run pytest tests/test_mailbox_adapter.py -v
    inputs:
    - '@group(sources)'
    - tests/test_mailbox_adapter.py
  no-graphiti-smoke:
    command: uv run pytest tests/test_no_graphiti_default_loop.py -v
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  bench-retrieval:
    command: uv run pytest tests/test_retrieval_benchmarks.py -v
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  bench-live:
    command: uv run python ../../../benchmarks/live_runtime_eval.py
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  bench-context:
    command: uv run python ../../../benchmarks/context_pack_eval.py
    inputs:
    - /benchmarks/context_pack_eval.py
    - /benchmarks/context_pack_cases.json
    - '@group(sources)'
    - '@group(tests)'
  bench-live-smoke:
    command: SIBYL_LIVE_RETRIEVAL_TESTS=1 uv run pytest tests/test_retrieval_live.py -v -s
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  test-cov:
    command: uv run pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    outputs:
    - coverage.xml
  check:
    deps:
    - ~:lint
    - ~:typecheck
    - ~:test
tags:
- python
- library
- core
fileGroups:
  sources:
  - src/**/*.py
  tests:
  - tests/**/*.py
  configs:
  - pyproject.toml
  - moon.yml
layer: library
