# sibyl-core - Shared library for Sibyl knowledge graph operations
# Domain models, graph client, retrieval, tools, auth primitives

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "../../../VERSION"
pattern = "(?P<version>.+)"

[project]
name = "sibyl-core"
dynamic = ["version"]
description = "Core library for Sibyl - domain models, graph operations, and knowledge retrieval"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.13"
authors = [{ name = "Stefanie Jane", email = "stef@hyperbliss.tech" }]
keywords = ["knowledge-graph", "graph-rag", "persistent-memory", "task-workflow"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    # Data & Validation
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    # Auth primitives (JWT, password hashing)
    "pyjwt>=2.10",
    # Async & HTTP
    "anyio>=4.0",
    "httpx>=0.27",
    # Logging
    "structlog>=24.0",
    # Environment
]

[project.optional-dependencies]
crawler = [
    "crawl4ai>=0.9.0",
    "mistune>=3.0",
]
embeddings = [
    "google-genai>=2.8.0",
]
graph = [
    "surrealdb>=2.0.0,<3.0",
]
graphrag = [
    "python-louvain>=0.16",
]
llm = [
    "pydantic-ai-slim[anthropic,google,openai]>=1.107.0,<2",
]
reranking = [
    "sentence-transformers>=3.0",
]
runtime = [
    "crawl4ai>=0.9.0",
    "google-genai>=2.8.0",
    "mistune>=3.0",
    "pydantic-ai-slim[anthropic,google,openai]>=1.107.0,<2",
    "python-louvain>=0.16",
    "sentence-transformers>=3.0",
    "surrealdb>=2.0.0,<3.0",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov>=7.0.0",
    "ruff",
    # Test-only mirrors of the runtime extras the suite exercises directly:
    # the graph backend, the numeric stack, and the pydantic-ai client layer.
    # They stay optional for the published package (graph/llm extras) but the
    # test env must install them or the graph/eval/ai modules fail collection.
    # Heavy extras (sentence-transformers, crawl4ai) are left out on purpose;
    # their tests importorskip so CI stays fast.
    "surrealdb>=2.0.0,<3.0",
    "numpy>=2.4.1",
    "pydantic-ai-slim[anthropic,google,openai]>=1.107.0,<2",
]

[project.urls]
Homepage = "https://github.com/hyperb1iss/sibyl"
Repository = "https://github.com/hyperb1iss/sibyl"

[tool.hatch.build.targets.wheel]
packages = ["src/sibyl_core"]

[tool.hatch.build.targets.sdist]
include = ["/src", "/tests", "/README.md"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["sibyl_core"]

# =============================================================================
