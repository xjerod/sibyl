# Docker Compose for isolated E2E data services.
# Uses a different SurrealDB port and volume than dev to avoid data pollution.
#
# Usage:
#   moon run e2e-up
#   SIBYL_SURREAL_URL=ws://localhost:8011/rpc moon run api:serve
#   moon run e2e
#   moon run e2e-down

services:
  surrealdb-e2e:
    image: ${SIBYL_SURREAL_IMAGE:-surrealdb/surrealdb:v3.1.0}
    container_name: sibyl-surrealdb-e2e
    command:
      [
        "start",
        "--log",
        "${SIBYL_SURREAL_LOG_LEVEL:-info}",
        "--user",
        "${SIBYL_SURREAL_USERNAME:-root}",
        "--pass",
        "${SIBYL_SURREAL_PASSWORD:-root}",
        "rocksdb:///data/sibyl-e2e.db",
      ]
    ports:
      - "${SIBYL_E2E_SURREAL_PORT:-8011}:8000"
    volumes:
      - sibyl_e2e_surreal:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--conn", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sibyl_e2e_surreal:
