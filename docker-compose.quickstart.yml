# ============================================================================
# Sibyl Quickstart — Zero-Config for Individual Developers
# ============================================================================
#
# Get running in 5 minutes with pre-built Docker images. No .env file required.
#
# Quick Start:
#   docker compose -f docker-compose.quickstart.yml up -d
#   Open http://localhost:3337
#   Complete onboarding (API keys entered via UI)
#
# All configuration happens through the web UI:
#   - API keys saved to encrypted database storage
#   - JWT secret auto-generated if not set
#   - Default passwords suitable for local development only
#
# Default mode: fully Surreal (graph + content + auth in one SurrealDB instance).
# Legacy imports are explicit archive migration flows. See
# docs/guide/migrating-from-falkor.md for the cutover playbook.
#
# Optional environment variables for advanced setup:
#   SIBYL_OPENAI_API_KEY      — Pre-configure via env (or enter in UI)
#   SIBYL_ANTHROPIC_API_KEY   — Pre-configure via env (or enter in UI)
#   SIBYL_SETTINGS_KEY        — Fernet key for settings encryption (auto-generated)
#   SIBYL_JWT_SECRET          — JWT signing key (auto-generated)
#   SIBYL_SURREAL_PASSWORD    — SurrealDB root password (default: sibyl_quickstart)
#   SIBYL_COORDINATION_BACKEND — Set to redis with --profile redis for an external worker
#
# Running alongside an existing dev setup (different ports):
#   SIBYL_SERVER_PORT=3344 SIBYL_WEB_PORT=3347 SIBYL_SURREAL_PORT=8010 \
#     docker compose -f docker-compose.quickstart.yml -p sibyl-qs up -d
#
# ============================================================================

services:
  # ==========================================================================
  # Sibyl Backend (API + MCP Server)
  # ==========================================================================
  api:
    image: ghcr.io/hyperb1iss/sibyl-api:latest
    container_name: sibyl-api
    ports:
      - "${SIBYL_SERVER_PORT:-3334}:3334"
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      # Store configuration — fully Surreal by default
      SIBYL_STORE: ${SIBYL_STORE:-surreal}
      SIBYL_AUTH_STORE: ${SIBYL_AUTH_STORE:-surreal}
      SIBYL_COORDINATION_BACKEND: ${SIBYL_COORDINATION_BACKEND:-auto}
      # SurrealDB connection (internal Docker network)
      SIBYL_SURREAL_URL: ws://surrealdb:8000/rpc
      SIBYL_SURREAL_USERNAME: ${SIBYL_SURREAL_USERNAME:-root}
      SIBYL_SURREAL_PASSWORD: ${SIBYL_SURREAL_PASSWORD:-sibyl_quickstart}
      # Auth — auto-generate if not provided
      SIBYL_JWT_SECRET: ${SIBYL_JWT_SECRET:-}
      SIBYL_SETTINGS_KEY: ${SIBYL_SETTINGS_KEY:-}
      SIBYL_PUBLIC_URL: http://localhost:${SIBYL_WEB_PORT:-3337}
      # AI Providers (optional — can be configured via UI during onboarding)
      SIBYL_OPENAI_API_KEY: ${SIBYL_OPENAI_API_KEY:-}
      SIBYL_ANTHROPIC_API_KEY: ${SIBYL_ANTHROPIC_API_KEY:-}
      SIBYL_LLM_PROVIDER: anthropic
      SIBYL_LLM_MODEL: claude-haiku-4-5
      # Server config
      SIBYL_SERVER_HOST: 0.0.0.0
      SIBYL_SERVER_PORT: 3334
      SIBYL_ENVIRONMENT: development
    volumes:
      - sibyl_secrets:/root/.sibyl
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:3334/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ==========================================================================
  # Background Worker (Redis/Valkey profile only)
  # ==========================================================================
  worker:
    profiles: ["redis"]
    image: ghcr.io/hyperb1iss/sibyl-api:latest
    container_name: sibyl-worker
    command: ["sibyld", "worker"]
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SIBYL_STORE: ${SIBYL_STORE:-surreal}
      SIBYL_AUTH_STORE: ${SIBYL_AUTH_STORE:-surreal}
      SIBYL_COORDINATION_BACKEND: ${SIBYL_COORDINATION_BACKEND:-redis}
      SIBYL_REDIS_HOST: ${SIBYL_REDIS_HOST:-redis}
      SIBYL_REDIS_PORT: 6379
      SIBYL_SURREAL_URL: ws://surrealdb:8000/rpc
      SIBYL_SURREAL_USERNAME: ${SIBYL_SURREAL_USERNAME:-root}
      SIBYL_SURREAL_PASSWORD: ${SIBYL_SURREAL_PASSWORD:-sibyl_quickstart}
      SIBYL_SETTINGS_KEY: ${SIBYL_SETTINGS_KEY:-}
      SIBYL_OPENAI_API_KEY: ${SIBYL_OPENAI_API_KEY:-}
      SIBYL_ANTHROPIC_API_KEY: ${SIBYL_ANTHROPIC_API_KEY:-}
      SIBYL_LLM_PROVIDER: anthropic
      SIBYL_LLM_MODEL: claude-haiku-4-5
    volumes:
      - sibyl_secrets:/root/.sibyl
    restart: unless-stopped

  # ==========================================================================
  # Redis/Valkey (optional distributed coordination)
  # ==========================================================================
  redis:
    profiles: ["redis"]
    image: valkey/valkey:8-alpine
    container_name: sibyl-redis
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  # ==========================================================================
  # Frontend (Next.js Web UI)
  # ==========================================================================
  web:
    image: ghcr.io/hyperb1iss/sibyl-web:latest
    container_name: sibyl-web
    ports:
      - "${SIBYL_WEB_PORT:-3337}:3337"
    depends_on:
      api:
        condition: service_healthy
    environment:
      SIBYL_API_URL: http://api:3334/api # Server-side (SSR) fetches
      NEXT_PUBLIC_API_URL: http://localhost:${SIBYL_SERVER_PORT:-3334} # Client-side (browser) fetches
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3337/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # SurrealDB (graph + content + auth, unified)
  # ==========================================================================
  surrealdb:
    image: ${SIBYL_SURREAL_IMAGE:-surrealdb/surrealdb:v3.0.5}
    container_name: sibyl-surrealdb
    command:
      [
        "start",
        "--log",
        "info",
        "--user",
        "${SIBYL_SURREAL_USERNAME:-root}",
        "--pass",
        "${SIBYL_SURREAL_PASSWORD:-sibyl_quickstart}",
        "rocksdb:///data/sibyl.db",
      ]
    ports:
      - "${SIBYL_SURREAL_PORT:-8000}:8000"
    volumes:
      - sibyl_surreal:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--conn", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  sibyl_secrets:
    name: sibyl_secrets
  sibyl_surreal:
    name: sibyl_surreal

networks:
  default:
    name: sibyl
