# ============================================================================
# Sibyl Production Docker Compose
# Complete stack: Backend, Frontend, SurrealDB (unified store)
# ============================================================================
#
# Quick Start:
#   1. Copy .env.example to ~/.sibyl/prod.env and configure secrets
#   2. docker compose --env-file ~/.sibyl/prod.env -f docker-compose.prod.yml up -d
#   3. Visit http://localhost:3337
#
# Default mode is fully Surreal. Legacy imports are file-based migration flows
# documented in docs/guide/migrating-from-falkor.md, not production services.
#
# Environment Variables (required):
#   SIBYL_JWT_SECRET          — Random secret for JWT signing (openssl rand -hex 32)
#   SIBYL_OPENAI_API_KEY      — OpenAI API key for embeddings
#   SIBYL_ANTHROPIC_API_KEY   — Anthropic API key for entity extraction and agents
#
# Environment Variables (optional):
#   SIBYL_SURREAL_PASSWORD    — SurrealDB root password (default: sibyl_dev; CHANGE IN PROD)
#   SIBYL_COORDINATION_BACKEND — Set to redis with --profile redis for an external worker

services:
  # ==========================================================================
  # Backend API + MCP Server
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sibyl-backend
    depends_on:
      surrealdb:
        condition: service_healthy
    ports:
      - "3334:3334"
    environment:
      # Runtime environment and auth hardening
      SIBYL_ENVIRONMENT: ${SIBYL_ENVIRONMENT:-production}
      SIBYL_LOCAL_AUTH_ENABLED: ${SIBYL_LOCAL_AUTH_ENABLED:-false}
      # Store selection — fully Surreal by default
      SIBYL_STORE: ${SIBYL_STORE:-surreal}
      SIBYL_AUTH_STORE: ${SIBYL_AUTH_STORE:-surreal}
      SIBYL_COORDINATION_BACKEND: ${SIBYL_COORDINATION_BACKEND:-auto}
      # SurrealDB (primary)
      SIBYL_SURREAL_URL: ws://surrealdb:8000/rpc
      SIBYL_SURREAL_USERNAME:
        ${SIBYL_SURREAL_USERNAME:?Set SIBYL_SURREAL_USERNAME in the environment}
      SIBYL_SURREAL_PASSWORD:
        ${SIBYL_SURREAL_PASSWORD:?Set SIBYL_SURREAL_PASSWORD in the environment}
      # Auth (REQUIRED)
      SIBYL_JWT_SECRET: ${SIBYL_JWT_SECRET:?Set SIBYL_JWT_SECRET in the environment}
      SIBYL_SERVER_URL: ${SIBYL_SERVER_URL:-http://localhost:3334}
      # OpenAI (REQUIRED for embeddings)
      SIBYL_OPENAI_API_KEY: ${SIBYL_OPENAI_API_KEY:?Set SIBYL_OPENAI_API_KEY in the environment}
      # Anthropic (REQUIRED for entity extraction and agents)
      SIBYL_ANTHROPIC_API_KEY:
        ${SIBYL_ANTHROPIC_API_KEY:?Set SIBYL_ANTHROPIC_API_KEY in the environment}
      SIBYL_LLM_PROVIDER: anthropic
      SIBYL_LLM_MODEL: claude-haiku-4-5
      # Server config
      SIBYL_SERVER_HOST: 0.0.0.0
      SIBYL_SERVER_PORT: 3334
    healthcheck:
      test:
        ["CMD-SHELL", 'python -c "import httpx; httpx.get(''http://localhost:3334/api/health'')"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ==========================================================================
  # Frontend (Next.js)
  # ==========================================================================
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sibyl-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3337:3337"
    environment:
      # API URL for client-side requests (browser → external URL)
      NEXT_PUBLIC_API_URL: ${SIBYL_SERVER_URL:-http://localhost:3334}
      # API URL for server-side requests (Next.js server → backend container)
      SIBYL_API_URL: http://backend:3334/api
      NODE_ENV: production
    restart: unless-stopped

  # ==========================================================================
  # Background Worker (Redis/Valkey profile only)
  # ==========================================================================
  worker:
    profiles: ["redis"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sibyl-worker
    command: ["sibyld", "worker"]
    depends_on:
      surrealdb:
        condition: service_healthy
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SIBYL_ENVIRONMENT: ${SIBYL_ENVIRONMENT:-production}
      SIBYL_LOCAL_AUTH_ENABLED: ${SIBYL_LOCAL_AUTH_ENABLED:-false}
      SIBYL_STORE: ${SIBYL_STORE:-surreal}
      SIBYL_AUTH_STORE: ${SIBYL_AUTH_STORE:-surreal}
      SIBYL_COORDINATION_BACKEND: ${SIBYL_COORDINATION_BACKEND:-redis}
      SIBYL_REDIS_HOST: ${SIBYL_REDIS_HOST:-redis}
      SIBYL_REDIS_PORT: 6379
      SIBYL_SURREAL_URL: ws://surrealdb:8000/rpc
      SIBYL_SURREAL_USERNAME:
        ${SIBYL_SURREAL_USERNAME:?Set SIBYL_SURREAL_USERNAME in the environment}
      SIBYL_SURREAL_PASSWORD:
        ${SIBYL_SURREAL_PASSWORD:?Set SIBYL_SURREAL_PASSWORD in the environment}
      SIBYL_OPENAI_API_KEY: ${SIBYL_OPENAI_API_KEY:?Set SIBYL_OPENAI_API_KEY in the environment}
      SIBYL_ANTHROPIC_API_KEY:
        ${SIBYL_ANTHROPIC_API_KEY:?Set SIBYL_ANTHROPIC_API_KEY in the environment}
      SIBYL_LLM_PROVIDER: anthropic
      SIBYL_LLM_MODEL: claude-haiku-4-5
    restart: unless-stopped

  # ==========================================================================
  # Redis/Valkey (optional distributed coordination)
  # ==========================================================================
  redis:
    profiles: ["redis"]
    image: valkey/valkey:8-alpine
    container_name: sibyl-redis
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  # ==========================================================================
  # SurrealDB (graph + content + auth, unified)
  # ==========================================================================
  # The SurrealDB image runs as UID 65532 (distroless nonroot), but a
  # fresh named volume is created root-owned, so SurrealDB cannot create
  # its RocksDB directory under /data. This one-shot fixes the volume
  # ownership before SurrealDB starts; the chown is idempotent on reruns.
  surreal-init:
    image: busybox:1.37
    container_name: sibyl-surreal-init
    command: ["chown", "-R", "65532:65532", "/data"]
    volumes:
      - surreal_data:/data
    restart: "no"

  surrealdb:
    image: ${SIBYL_SURREAL_IMAGE:-surrealdb/surrealdb:v3.1.0}
    container_name: sibyl-surrealdb
    depends_on:
      surreal-init:
        condition: service_completed_successfully
    command:
      [
        "start",
        "--log",
        "info",
        "--user",
        "${SIBYL_SURREAL_USERNAME:?Set SIBYL_SURREAL_USERNAME in the environment}",
        "--pass",
        "${SIBYL_SURREAL_PASSWORD:?Set SIBYL_SURREAL_PASSWORD in the environment}",
        "rocksdb:///data/sibyl.db",
      ]
    ports:
      - "${SIBYL_SURREAL_PORT:-8000}:8000"
    volumes:
      - surreal_data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "ws://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  surreal_data:

networks:
  default:
    name: sibyl-network
