# https://moonrepo.dev/docs/config/project
$schema: https://moonrepo.dev/schemas/project.json

language: other
layer: configuration

tasks:
  # ==========================================================================
  # Development
  # ==========================================================================
  dev:
    command: bash tools/dev/run-surreal-dev.sh
    env:
      FORCE_COLOR: "1"
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
    preset: server
    options:
      persistent: true

  # Alias kept for muscle memory; will be removed in a future release.
  dev-surreal:
    command: bash tools/dev/run-surreal-dev.sh
    env:
      FORCE_COLOR: "1"
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
    preset: server
    options:
      persistent: true

  dev-legacy:
    command: bash tools/dev/run-surreal-dev.sh
    env:
      FORCE_COLOR: "1"
      SIBYL_STORE: "legacy"
      SIBYL_COORDINATION_BACKEND: "auto"
    preset: server
    options:
      persistent: true

  migrate-local-surreal:
    command: bash tools/dev/migrate-local-surreal.sh
    env:
      FORCE_COLOR: "1"
    inputs:
      - tools/dev/*.sh
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  dev-api:
    script: |
      docker compose up -d surrealdb
      sleep 1
      uv run --directory apps/api sibyld serve --reload
    env:
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
      SIBYL_SURREAL_URL: "ws://127.0.0.1:8000/rpc"
      SIBYL_SURREAL_USERNAME: "root"
      SIBYL_SURREAL_PASSWORD: "root"
    preset: server
    options:
      persistent: true

  dev-web:
    command: moon run web:dev
    preset: server
    options:
      persistent: true

  stop:
    command: bash tools/dev/stop-dev.sh
    preset: server

  # ==========================================================================
  # Docker
  # ==========================================================================
  docker-up:
    command: docker compose up -d
    preset: server

  docker-down:
    command: docker compose down
    preset: server

  docker-logs:
    command: docker compose logs -f
    preset: server
    options:
      persistent: true

  # ==========================================================================
  # Quickstart (uses GHCR images - same as end-users)
  # ==========================================================================
  quickstart:
    script: |
      if [ ! -f .env.quickstart ]; then
        echo "⚠️  Create .env.quickstart with your API keys first"
        echo "   cp .env.quickstart.example .env.quickstart"
        exit 1
      fi
      docker compose -f docker-compose.quickstart.yml --env-file .env.quickstart up -d
      echo ""
      echo "🔮 Sibyl quickstart running!"
      echo "   Web UI:   http://localhost:${SIBYL_WEB_PORT:-3337}"
      echo "   API:      http://localhost:${SIBYL_SERVER_PORT:-3334}"
      echo "   SurrealDB: http://localhost:${SIBYL_SURREAL_PORT:-8000}"
    preset: server

  quickstart-stop:
    command: docker compose -f docker-compose.quickstart.yml down
    preset: server

  quickstart-logs:
    command: docker compose -f docker-compose.quickstart.yml logs -f
    preset: server
    options:
      persistent: true

  # Test instance (runs alongside dev on different ports)
  quickstart-test:
    script: |
      if [ ! -f .env.quickstart ]; then
        echo "⚠️  Create .env.quickstart with your API keys first"
        exit 1
      fi
      docker compose -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml --env-file .env.quickstart up -d
      echo ""
      echo "🧪 Sibyl TEST instance running (separate from dev)!"
      echo "   Web UI:    http://localhost:3347"
      echo "   API:       http://localhost:3344"
      echo "   SurrealDB: http://localhost:8010"
    preset: server

  quickstart-test-stop:
    command:
      docker compose -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml down
    preset: server

  quickstart-test-logs:
    command:
      docker compose -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml logs -f
    preset: server
    options:
      persistent: true

  quickstart-pull:
    command: docker compose -f docker-compose.quickstart.yml pull
    preset: server

  # ==========================================================================
  # Installation
  # ==========================================================================
  install:
    deps:
      - cli:install
      - api:install
      - skills:install
      - hooks:install
    preset: server

  install-dev:
    deps:
      - cli:install-dev
      - api:install-dev
      - skills:install
      - hooks:install
    preset: server

  # ==========================================================================
  # Formatting (aggregates individual project tasks)
  # ==========================================================================
  format:
    command: "npx prettier --write '*.md' '*.yml' '*.yaml'"
    inputs:
      - "*.md"
      - "*.yml"
      - "*.yaml"
    preset: server

  fmt:
    deps:
      - root:format
      - docs:format
      - skills:format
      - infra:format
    preset: server

  fmt-check:
    deps:
      - docs:lint
      - skills:lint
      - infra:lint

  # ==========================================================================
  # Quality (all packages)
  # ==========================================================================
  lint:
    deps:
      - ~:inventory-lint
      - ~:storage-access-check
      - core:lint
      - api:lint
      - cli:lint
      - web:lint
      - hooks:lint
      - docs:lint
      - skills:lint
      - infra:lint

  fix:
    deps:
      - core:fix
      - api:fix
      - cli:fix
      - web:fix
      - hooks:fix
    preset: server

  typecheck:
    deps:
      - ~:inventory-typecheck
      - core:typecheck
      - api:typecheck
      - cli:typecheck
      - web:typecheck
      - hooks:typecheck

  check:
    deps:
      - ~:inventory-check
      - ~:inventory-lint
      - ~:inventory-typecheck
      - ~:inventory-test
      - ~:bench-gate-test
      - ~:chaos-test
      - ~:storage-access-check
      - ~:storage-access-test
      - ~:baseline-test
      - core:check
      - api:check
      - cli:check
      - web:check
      - hooks:check
      - docs:lint
      - skills:lint
      - infra:lint

  test:
    deps:
      - ~:inventory-test
      - ~:bench-gate-test
      - ~:chaos-test
      - ~:storage-access-test
      - ~:baseline-test
      - core:test
      - api:test
      - cli:test
      - web:test

  inventory:
    command: uv run python tools/inventory/runtime_surface.py
    inputs:
      - tools/**/*.py
      - docs/research/rust-port/INVENTORY.md
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml
      - apps/cli/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml
    outputs:
      - docs/research/rust-port/INVENTORY.md

  inventory-check:
    command: uv run python tools/inventory/runtime_surface.py --check
    inputs:
      - tools/**/*.py
      - docs/research/rust-port/INVENTORY.md
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml
      - apps/cli/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  inventory-lint:
    script: uv run ruff check tools && uv run ruff format --check tools
    inputs:
      - tools/**/*.py

  inventory-typecheck:
    command: uv run ty check tools
    inputs:
      - tools/**/*.py
      - pyproject.toml

  inventory-test:
    command: uv run pytest tools/tests/test_runtime_surface.py -v
    inputs:
      - tools/**/*.py
      - docs/research/rust-port/INVENTORY.md
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml
      - apps/cli/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  bench-gate:
    command: uv run python -m tools.bench.eval_gate
    inputs:
      - tools/**/*.py
      - benchmarks/**/*.py
      - pyproject.toml

  bench-gate-test:
    command: uv run pytest tools/tests/test_bench_gate.py -v
    inputs:
      - tools/**/*.py
      - pyproject.toml

  chaos-archive:
    command: uv run python -m tools.chaos.archive_probe
    inputs:
      - tools/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  chaos-test:
    command: uv run pytest tools/tests/test_archive_probe.py -v
    inputs:
      - tools/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  storage-access-check:
    command: uv run python -m tools.lint.no_direct_storage_access
    inputs:
      - tools/**/*.py
      - apps/api/src/sibyl/api/routes/**/*.py
      - apps/api/src/sibyl/auth/dependencies.py
      - apps/api/src/sibyl/server.py
      - apps/api/src/sibyl/auth/mcp_auth.py
      - apps/api/src/sibyl/auth/mcp_oauth.py
      - packages/python/sibyl-core/src/sibyl_core/tools/**/*.py
      - pyproject.toml

  storage-access-test:
    command: uv run pytest tools/tests/test_no_direct_storage_access.py -v
    inputs:
      - tools/**/*.py
      - pyproject.toml

  baseline-capture:
    command: uv run python -m tools.baselines.capture
    inputs:
      - tools/**/*.py
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - baselines/**/*.jsonl
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml
    outputs:
      - baselines/**/*.jsonl
      - baselines/manifest.json

  baseline-seed:
    command: uv run python -m tools.baselines.seed
    inputs:
      - tools/**/*.py
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml
    outputs:
      - .moon/cache/baseline-runtime-manifest.json

  baseline-replay:
    command: uv run python -m tools.baselines.replay
    inputs:
      - tools/**/*.py
      - baselines/**/*.jsonl
      - baselines/manifest.json
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  baseline-replay-runtime:
    command:
      uv run python -m tools.baselines.replay --manifest-path
      .moon/cache/baseline-runtime-manifest.json
    inputs:
      - tools/**/*.py
      - baselines/**/*.jsonl
      - .moon/cache/baseline-runtime-manifest.json
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  baseline-test:
    command: uv run pytest tools/tests/test_baselines.py -v
    inputs:
      - tools/**/*.py
      - pyproject.toml

  migrate-rehearse:
    command: uv run sibyld migrate rehearse
    inputs:
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - tools/**/*.py
      - baselines/**/*.jsonl
      - .moon/cache/baseline-runtime-manifest.json
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  # ==========================================================================
  # Coverage
  # ==========================================================================
  coverage:
    deps:
      - api:test-cov
      - cli:test-cov
      - core:test-cov
      - web:test-cov

  bench-retrieval:
    deps:
      - core:bench-retrieval

  bench-live:
    command: uv run python benchmarks/live_runtime_eval.py

  bench-live-smoke:
    command: uv run pytest packages/python/sibyl-core/tests/test_retrieval_live.py -v -s

  # ==========================================================================
  # E2E Testing
  # ==========================================================================
  e2e-up:
    command: docker compose -f compose.e2e.yml up -d
    preset: server

  e2e-down:
    command: docker compose -f compose.e2e.yml down -v
    preset: server
