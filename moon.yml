    options:
      cache: false

  # ==========================================================================
  # E2E Testing
  # ==========================================================================
  e2e-up:
    command: docker compose --env-file /dev/null -f compose.e2e.yml up -d
    preset: server

  e2e-down:
    command: docker compose --env-file /dev/null -f compose.e2e.yml down -v
    preset: server
