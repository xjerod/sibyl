  python-package-build:
    script: |
      set -euo pipefail
      rm -rf dist
      mkdir -p dist
      uv build --package sibyl-core --out-dir dist/
      uv build --package sibyl-dev --out-dir dist/
      uv build --package sibyld --out-dir dist/
      python - <<'PY'
      from email.parser import Parser
      from pathlib import Path
      import re
      from zipfile import ZipFile
      from tools.release.homebrew_formula import pep440_version

      wheel = next(Path("dist").glob("sibyl_dev-*.whl"))
      required = {
          "sibyl_cli/data/skills/sibyl/SKILL.md",
          "sibyl_cli/data/skill-packs/core.md",
          "sibyl_cli/data/skill-packs/examples.md",
          "sibyl_cli/data/skill-packs/migration.md",
          "sibyl_cli/data/skill-packs/workflows.md",
      }
      with ZipFile(wheel) as archive:
          missing = sorted(required - set(archive.namelist()))
      if missing:
          raise SystemExit("Missing CLI bundle data: " + ", ".join(missing))

      version = pep440_version(Path("VERSION").read_text(encoding="utf-8").strip())
      expected_core = f"=={version}"
      expected_requirements = {
          "sibyl_dev-*.whl": (expected_core, set()),
          "sibyld-*.whl": (expected_core, {"crawler", "embeddings", "graph", "graphrag", "llm"}),
      }
      core_requirement = re.compile(
          r"^sibyl-core(?:\[(?P<extras>[^\]]+)\])?\s*(?P<specifier>==\s*[^;,\s]+)"
      )

      for wheel_pattern, (expected_specifier, expected_extras) in expected_requirements.items():
          wheel = next(Path("dist").glob(wheel_pattern))
          with ZipFile(wheel) as archive:
              metadata_name = next(name for name in archive.namelist() if name.endswith(".dist-info/METADATA"))
              metadata = Parser().parsestr(archive.read(metadata_name).decode("utf-8"))
          core_requirements = []
          for value in metadata.get_all("Requires-Dist", []):
              if match := core_requirement.match(value):
                  extras = {
                      extra.strip()
                      for extra in (match.group("extras") or "").split(",")
                      if extra.strip()
                  }
                  core_requirements.append((match.group("specifier").replace(" ", ""), extras))
          if len(core_requirements) != 1:
              raise SystemExit(f"{wheel.name} must declare exactly one sibyl-core dependency")
          specifier, extras = core_requirements[0]
          if specifier != expected_specifier:
              raise SystemExit(
                  f"{wheel.name} pins sibyl-core as {specifier}, expected {expected_specifier}"
              )
          if extras != expected_extras:
              raise SystemExit(
                  f"{wheel.name} declares sibyl-core extras {sorted(extras)}, "
                  f"expected {sorted(expected_extras)}"
              )
      PY
      ls -la dist/
    inputs:
      - VERSION
      - pyproject.toml
      - uv.lock
      - apps/api/README.md
      - apps/api/pyproject.toml
      - apps/api/src/**/*.py
      - apps/cli/README.md
      - apps/cli/pyproject.toml
      - apps/cli/src/**/*.py
      - apps/cli/src/sibyl_cli/data/**/*
      - packages/python/sibyl-core/README.md
      - packages/python/sibyl-core/pyproject.toml
      - packages/python/sibyl-core/src/**/*.py
    outputs:
