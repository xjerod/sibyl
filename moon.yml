    command: uv run python benchmarks/live_runtime_eval.py
    options:
      cache: false

  bench-longmemeval-live:
    command: uv run python benchmarks/longmemeval_live.py
    options:
      cache: false

  bench-longmemeval-replay:
    command: uv run python benchmarks/longmemeval_replay.py
    options:
      cache: false

  bench-longmemeval-v2-probe:
    command: uv run python benchmarks/longmemeval_v2_probe.py
    options:
      cache: false

  bench-longmemeval-v2-download:
    command: uv run --with huggingface-hub python benchmarks/longmemeval_v2_download.py
    options:
      cache: false

  bench-longmemeval-v2-official:
    command: uv run python benchmarks/longmemeval_v2_official.py
    options:
      cache: false

  bench-longmemeval-v2-official-full:
    command:
      uv run --with huggingface-hub --with numpy --with openai --with pillow --with tqdm --with
