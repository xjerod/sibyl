# https://moonrepo.dev/docs/config/project
$schema: https://moonrepo.dev/schemas/project.json

language: other
layer: configuration

tasks:
  # ==========================================================================
  # Development
  # ==========================================================================
  dev:
    script: |
      docker compose up -d && sleep 1 && npx concurrently --raw --kill-others-on-fail \
        "uv run --directory apps/api sibyld serve --reload" \
        "uv run --directory apps/api arq sibyl.jobs.worker.WorkerSettings --watch src" \
        "moon run web:dev"
    env:
      FORCE_COLOR: "1"
    preset: server
    options:
      persistent: true

  dev-api:
    script: |
      docker compose up -d
      sleep 1
      uv run --directory apps/api sibyld serve --reload
    preset: server
    options:
      persistent: true

  dev-web:
    command: moon run web:dev
    preset: server
    options:
      persistent: true

  stop:
    script: |
      echo "🛑 Stopping Sibyl services..."
      pkill -f "sibyl-serve" 2>/dev/null || true
      pkill -f "next dev" 2>/dev/null || true
      docker compose down
      echo "✓ All services stopped"
    preset: server

  # ==========================================================================
  # Docker
  # ==========================================================================
  docker-up:
    command: docker compose up -d
    preset: server

  docker-down:
    command: docker compose down
    preset: server

  docker-logs:
    command: docker compose logs -f
    preset: server
    options:
      persistent: true

  # ==========================================================================
  # Quickstart (uses GHCR images - same as end-users)
  # ==========================================================================
  quickstart:
    script: |
      if [ ! -f .env.quickstart ]; then
        echo "⚠️  Create .env.quickstart with your API keys first"
        echo "   cp .env.quickstart.example .env.quickstart"
        exit 1
      fi
      docker compose -f docker-compose.quickstart.yml --env-file .env.quickstart up -d
      echo ""
      echo "🚀 Sibyl quickstart running!"
      echo "   Web UI:   http://localhost:${SIBYL_WEB_PORT:-3337}"
      echo "   API:      http://localhost:${SIBYL_SERVER_PORT:-3334}"
      echo "   Graph UI: http://localhost:${SIBYL_FALKORDB_BROWSER_PORT:-3335}"
    preset: server

  quickstart-stop:
    command: docker compose -f docker-compose.quickstart.yml down
    preset: server

  quickstart-logs:
    command: docker compose -f docker-compose.quickstart.yml logs -f
    preset: server
    options:
      persistent: true

  # Test instance (runs alongside dev on different ports)
  quickstart-test:
    script: |
      if [ ! -f .env.quickstart ]; then
        echo "⚠️  Create .env.quickstart with your API keys first"
        exit 1
      fi
      docker compose -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml --env-file .env.quickstart up -d
      echo ""
      echo "🧪 Sibyl TEST instance running (separate from dev)!"
      echo "   Web UI:   http://localhost:3347"
      echo "   API:      http://localhost:3344"
      echo "   Graph UI: http://localhost:3345"
    preset: server

  quickstart-test-stop:
    command:
      docker compose -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml down
    preset: server

  quickstart-test-logs:
    command:
      docker compose -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml logs -f
    preset: server
    options:
      persistent: true

  quickstart-pull:
    command: docker compose -f docker-compose.quickstart.yml pull
    preset: server

  # ==========================================================================
  # Installation
  # ==========================================================================
  install:
    deps:
      - cli:install
      - api:install
      - skills:install
      - hooks:install
    preset: server

  install-dev:
    deps:
      - cli:install-dev
      - api:install-dev
      - skills:install
      - hooks:install
    preset: server

  # ==========================================================================
  # Formatting (aggregates individual project tasks)
  # ==========================================================================
  format:
    command: "npx prettier --write '*.md' '*.yml' '*.yaml'"
    inputs:
      - "*.md"
      - "*.yml"
      - "*.yaml"
    preset: server

  fmt:
    deps:
      - root:format
      - docs:format
      - skills:format
      - infra:format
    preset: server

  fmt-check:
    deps:
      - docs:lint
      - skills:lint
      - infra:lint

  # ==========================================================================
  # Quality (all packages)
  # ==========================================================================
  lint:
    deps:
      - ~:inventory-lint
      - core:lint
      - api:lint
      - cli:lint
      - web:lint
      - hooks:lint
      - docs:lint
      - skills:lint
      - infra:lint

  fix:
    deps:
      - core:fix
      - api:fix
      - cli:fix
      - web:fix
      - hooks:fix
    preset: server

  typecheck:
    deps:
      - ~:inventory-typecheck
      - core:typecheck
      - api:typecheck
      - cli:typecheck
      - web:typecheck
      - hooks:typecheck

  check:
    deps:
      - ~:inventory-check
      - core:check
      - api:check
      - cli:check
      - web:check
      - hooks:check
      - docs:lint
      - skills:lint
      - infra:lint

  test:
    deps:
      - ~:inventory-test
      - core:test
      - api:test
      - cli:test
      - web:test

  inventory:
    command: uv run python tools/inventory/runtime_surface.py
    inputs:
      - tools/**/*.py
      - docs/research/rust-port/INVENTORY.md
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml
      - apps/cli/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml
    outputs:
      - docs/research/rust-port/INVENTORY.md

  inventory-check:
    command: uv run python tools/inventory/runtime_surface.py --check
    inputs:
      - tools/**/*.py
      - docs/research/rust-port/INVENTORY.md
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml
      - apps/cli/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  inventory-lint:
    script: uv run ruff check tools && uv run ruff format --check tools
    inputs:
      - tools/**/*.py

  inventory-typecheck:
    command:
      uv run ty check tools/inventory/runtime_surface.py tools/tests/conftest.py tools/tests/test_runtime_surface.py
    inputs:
      - tools/**/*.py
      - pyproject.toml

  inventory-test:
    command: uv run pytest tools/tests/test_runtime_surface.py -v
    inputs:
      - tools/**/*.py
      - docs/research/rust-port/INVENTORY.md
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml
      - apps/cli/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  # ==========================================================================
  # Coverage
  # ==========================================================================
  coverage:
    deps:
      - api:test-cov
      - cli:test-cov
      - core:test-cov
      - web:test-cov

  bench-retrieval:
    deps:
      - core:bench-retrieval

  bench-live:
    command: uv run python benchmarks/live_runtime_eval.py

  bench-live-smoke:
    command: uv run pytest packages/python/sibyl-core/tests/test_retrieval_live.py -v -s

  # ==========================================================================
  # E2E Testing
  # ==========================================================================
  e2e-up:
    command: docker compose -f compose.e2e.yml up -d
    preset: server

  e2e-down:
    command: docker compose -f compose.e2e.yml down -v
    preset: server
