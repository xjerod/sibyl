# https://moonrepo.dev/docs/config/project
$schema: https://moonrepo.dev/schemas/project.json

language: other
layer: configuration

tasks:
  # ==========================================================================
  # Development
  # ==========================================================================
  dev:
    command: bash tools/dev/run-surreal-dev.sh
    env:
      FORCE_COLOR: "1"
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
    preset: server
    options:
      persistent: true

  # Alias kept for muscle memory; will be removed in a future release.
  dev-surreal:
    command: bash tools/dev/run-surreal-dev.sh
    env:
      FORCE_COLOR: "1"
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
    preset: server
    options:
      persistent: true

  dev-api:
    script: |
      docker compose up -d surrealdb
      sleep 1
      uv run --directory apps/api sibyld serve --reload
    env:
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
      SIBYL_SURREAL_URL: "ws://127.0.0.1:8000/rpc"
      SIBYL_SURREAL_USERNAME: "root"
      SIBYL_SURREAL_PASSWORD: "root"
      SIBYL_EMAIL_OUTBOX_PATH: ".moon/cache/auth-flow-email-outbox.jsonl"
    preset: server
    options:
      persistent: true

  dev-web:
    command: moon run web:dev
    preset: server
    options:
      persistent: true

  stop:
    command: bash tools/dev/stop-dev.sh
    preset: server

  # ==========================================================================
  # Docker
  # ==========================================================================
  docker-up:
    command: docker compose up -d
    preset: server

  docker-down:
    command: docker compose down
    preset: server

  docker-logs:
    command: docker compose logs -f
    preset: server
    options:
      persistent: true

  # ==========================================================================
  # Quickstart (uses GHCR images - same as end-users)
  # ==========================================================================
  quickstart:
    script: |
      if [ ! -f .env.quickstart ]; then
        echo "⚠️  Create .env.quickstart with your API keys first"
        echo "   cp .env.quickstart.example .env.quickstart"
        exit 1
      fi
      docker compose -f docker-compose.quickstart.yml --env-file .env.quickstart up -d
      echo ""
      echo "🔮 Sibyl quickstart running!"
      echo "   Web UI:   http://localhost:${SIBYL_WEB_PORT:-3337}"
      echo "   API:      http://localhost:${SIBYL_SERVER_PORT:-3334}"
      echo "   SurrealDB: http://localhost:${SIBYL_SURREAL_PORT:-8000}"
    preset: server

  quickstart-stop:
    command: docker compose -f docker-compose.quickstart.yml down
    preset: server

  quickstart-logs:
    command: docker compose -f docker-compose.quickstart.yml logs -f
    preset: server
    options:
      persistent: true

  # Test instance (runs alongside dev on different ports)
  quickstart-test:
    script: |
      if [ ! -f .env.quickstart ]; then
        echo "⚠️  Create .env.quickstart with your API keys first"
        exit 1
      fi
      docker compose -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml --env-file .env.quickstart up -d
      echo ""
      echo "🧪 Sibyl TEST instance running (separate from dev)!"
      echo "   Web UI:    http://localhost:3347"
      echo "   API:       http://localhost:3344"
      echo "   SurrealDB: http://localhost:8010"
    preset: server

  quickstart-test-stop:
    command:
      docker compose -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml down
    preset: server

  quickstart-test-logs:
    command:
      docker compose -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml logs -f
    preset: server
    options:
      persistent: true

  quickstart-pull:
    command: docker compose -f docker-compose.quickstart.yml pull
    preset: server

  # ==========================================================================
  # Installation
  # ==========================================================================
  install:
    deps:
      - cli:install
      - api:install
      - skills:install
      - hooks:install
    preset: server

  install-dev:
    deps:
      - cli:install-dev
      - api:install-dev
      - skills:install
      - hooks:install
    preset: server

  # ==========================================================================
  # Formatting (aggregates individual project tasks)
  # ==========================================================================
  format:
    command: "npx prettier --write '*.md' '*.yml' '*.yaml'"
    inputs:
      - "*.md"
      - "*.yml"
      - "*.yaml"
    preset: server

  fmt:
    deps:
      - root:format
      - docs:format
      - skills:format
      - infra:format
    preset: server

  fmt-check:
    deps:
      - docs:lint
      - skills:lint
      - infra:lint

  # ==========================================================================
  # Quality (all packages)
  # ==========================================================================
  lint:
    deps:
      - ~:inventory-lint
      - ~:storage-access-check
      - core:lint
      - api:lint
      - cli:lint
      - web:lint
      - hooks:lint
      - docs:lint
      - skills:lint
      - infra:lint

  fix:
    deps:
      - core:fix
      - api:fix
      - cli:fix
      - web:fix
      - hooks:fix
    preset: server

  typecheck:
    deps:
      - ~:inventory-typecheck
      - core:typecheck
      - api:typecheck
      - cli:typecheck
      - web:typecheck
      - hooks:typecheck

  check:
    deps:
      - ~:inventory-check
      - ~:inventory-lint
      - ~:inventory-typecheck
      - ~:inventory-test
      - ~:dev-script-test
      - ~:bench-gate-test
      - ~:chaos-test
      - ~:storage-access-check
      - ~:storage-access-test
      - ~:baseline-test
      - ~:memory-trust-gate-test
      - ~:synthesis-gate-test
      - ~:adapter-ingest-gate-test
      - core:check
      - api:check
      - cli:check
      - web:check
      - hooks:check
      - docs:lint
      - skills:lint
      - infra:lint

  test:
    deps:
      - ~:inventory-test
      - ~:dev-script-test
      - ~:bench-gate-test
      - ~:chaos-test
      - ~:storage-access-test
      - ~:baseline-test
      - ~:memory-trust-gate-test
      - ~:synthesis-gate-test
      - ~:adapter-ingest-gate-test
      - core:test
      - api:test
      - cli:test
      - web:test

  graphiti-compatibility-test:
    deps:
      - core:graphiti-compatibility-test
      - api:graphiti-compatibility-test

  inventory:
    command: uv run python tools/inventory/runtime_surface.py
    inputs:
      - tools/**/*.py
      - docs/architecture/SURREALDB_GRAPHITI_EXIT_INVENTORY.md
      - moon.yml
      - apps/api/moon.yml
      - packages/python/sibyl-core/moon.yml
      - README.md
      - AGENTS.md
      - CLAUDE.md
      - Tiltfile
      - .env.example
      - .env.quickstart.example
      - .env.quickstart.test
      - .env.test.example
      - apps/**/*.example
      - apps/**/*.md
      - apps/**/*.mdx
      - apps/**/*.sh
      - apps/**/*.yml
      - apps/**/*.yaml
      - charts/**/*
      - charts/**/*.example
      - compose.e2e.yml
      - docker-compose*.yml
      - docs/**/*.example
      - docs/**/*.md
      - docs/**/*.mdx
      - docs/**/*.sh
      - docs/**/*.yml
      - docs/**/*.yaml
      - .github/**/*.example
      - .github/**/*.md
      - .github/**/*.mdx
      - .github/**/*.sh
      - .github/**/*.yml
      - .github/**/*.yaml
      - infra/**/*.example
      - infra/**/*.md
      - infra/**/*.mdx
      - infra/**/*.sh
      - infra/**/*.yml
      - infra/**/*.yaml
      - packages/**/*.example
      - packages/**/*.md
      - packages/**/*.mdx
      - packages/**/*.sh
      - packages/**/*.yml
      - packages/**/*.yaml
      - skills/**/*.example
      - skills/**/*.md
      - skills/**/*.mdx
      - skills/**/*.sh
      - skills/**/*.yml
      - skills/**/*.yaml
      - setup-dev.sh
      - tools/**/*.example
      - tools/**/*.md
      - tools/**/*.mdx
      - tools/**/*.sh
      - tools/**/*.yml
      - tools/**/*.yaml
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - "**/pyproject.toml"
    outputs:
      - docs/research/rust-port/INVENTORY.md

  inventory-check:
    command: uv run python tools/inventory/runtime_surface.py --check
    inputs:
      - tools/**/*.py
      - docs/architecture/SURREALDB_GRAPHITI_EXIT_INVENTORY.md
      - docs/research/rust-port/INVENTORY.md
      - moon.yml
      - apps/api/moon.yml
      - packages/python/sibyl-core/moon.yml
      - README.md
      - AGENTS.md
      - CLAUDE.md
      - Tiltfile
      - .env.example
      - .env.quickstart.example
      - .env.quickstart.test
      - .env.test.example
      - apps/**/*.example
      - apps/**/*.md
      - apps/**/*.mdx
      - apps/**/*.sh
      - apps/**/*.yml
      - apps/**/*.yaml
      - charts/**/*
      - charts/**/*.example
      - compose.e2e.yml
      - docker-compose*.yml
      - docs/**/*.example
      - docs/**/*.md
      - docs/**/*.mdx
      - docs/**/*.sh
      - docs/**/*.yml
      - docs/**/*.yaml
      - .github/**/*.example
      - .github/**/*.md
      - .github/**/*.mdx
      - .github/**/*.sh
      - .github/**/*.yml
      - .github/**/*.yaml
      - infra/**/*.example
      - infra/**/*.md
      - infra/**/*.mdx
      - infra/**/*.sh
      - infra/**/*.yml
      - infra/**/*.yaml
      - packages/**/*.example
      - packages/**/*.md
      - packages/**/*.mdx
      - packages/**/*.sh
      - packages/**/*.yml
      - packages/**/*.yaml
      - skills/**/*.example
      - skills/**/*.md
      - skills/**/*.mdx
      - skills/**/*.sh
      - skills/**/*.yml
      - skills/**/*.yaml
      - setup-dev.sh
      - tools/**/*.example
      - tools/**/*.md
      - tools/**/*.mdx
      - tools/**/*.sh
      - tools/**/*.yml
      - tools/**/*.yaml
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - "**/pyproject.toml"

  inventory-lint:
    script: uv run ruff check tools && uv run ruff format --check tools
    inputs:
      - tools/**/*.py
      - pyproject.toml

  inventory-typecheck:
    command: uv run ty check tools
    inputs:
      - tools/**/*.py
      - pyproject.toml

  inventory-test:
    command:
      uv run pytest tools/tests/test_runtime_surface.py
      tools/tests/test_retrieval_mode_history.py -v
    inputs:
      - tools/**/*.py
      - docs/architecture/SURREALDB_GRAPHITI_EXIT_INVENTORY.md
      - docs/research/rust-port/INVENTORY.md
      - README.md
      - AGENTS.md
      - CLAUDE.md
      - Tiltfile
      - .env.example
      - .env.quickstart.example
      - .env.quickstart.test
      - .env.test.example
      - apps/**/*.example
      - apps/**/*.md
      - apps/**/*.mdx
      - apps/**/*.sh
      - apps/**/*.yml
      - apps/**/*.yaml
      - charts/**/*
      - charts/**/*.example
      - compose.e2e.yml
      - docker-compose*.yml
      - docs/**/*.example
      - docs/**/*.md
      - docs/**/*.mdx
      - docs/**/*.sh
      - docs/**/*.yml
      - docs/**/*.yaml
      - .github/**/*.example
      - .github/**/*.md
      - .github/**/*.mdx
      - .github/**/*.sh
      - .github/**/*.yml
      - .github/**/*.yaml
      - infra/**/*.example
      - infra/**/*.md
      - infra/**/*.mdx
      - infra/**/*.sh
      - infra/**/*.yml
      - infra/**/*.yaml
      - packages/**/*.example
      - packages/**/*.md
      - packages/**/*.mdx
      - packages/**/*.sh
      - packages/**/*.yml
      - packages/**/*.yaml
      - skills/**/*.example
      - skills/**/*.md
      - skills/**/*.mdx
      - skills/**/*.sh
      - skills/**/*.yml
      - skills/**/*.yaml
      - setup-dev.sh
      - tools/**/*.example
      - tools/**/*.md
      - tools/**/*.mdx
      - tools/**/*.sh
      - tools/**/*.yml
      - tools/**/*.yaml
      - moon.yml
      - apps/api/moon.yml
      - packages/python/sibyl-core/moon.yml
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - "**/pyproject.toml"

  dev-script-test:
    command:
      uv run pytest tools/tests/test_dev_scripts.py tools/tests/test_surreal_migration_moon_tasks.py
      -v
    inputs:
      - tools/dev/*.sh
      - tools/tests/conftest.py
      - tools/tests/test_dev_scripts.py
      - tools/tests/test_surreal_migration_moon_tasks.py
      - pyproject.toml
      - moon.yml

  bench-gate:
    command: uv run python -m tools.bench.eval_gate
    inputs:
      - tools/**/*.py
      - benchmarks/**/*.py
      - benchmarks/context_pack_cases.json
      - benchmarks/results/ai-memory/*.json
      - pyproject.toml

  retrieval-mode-history:
    command: uv run python -m tools.inventory.retrieval_mode_history
    inputs:
      - tools/**/*.py
      - pyproject.toml

  bench-gate-test:
    command: uv run pytest tools/tests/test_bench_gate.py tools/tests/test_longmemeval_bench.py -v
    inputs:
      - tools/**/*.py
      - benchmarks/longmemeval_bench.py
      - benchmarks/results/ai-memory/*.json
      - pyproject.toml

  chaos-archive:
    command: uv run python -m tools.chaos.archive_probe
    inputs:
      - tools/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  chaos-test:
    command: uv run pytest tools/tests/test_archive_probe.py -v
    inputs:
      - tools/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  storage-access-check:
    command: uv run python -m tools.lint.no_direct_storage_access
    inputs:
      - tools/**/*.py
      - apps/api/src/sibyl/api/routes/**/*.py
      - apps/api/src/sibyl/auth/dependencies.py
      - apps/api/src/sibyl/server.py
      - apps/api/src/sibyl/auth/mcp_auth.py
      - apps/api/src/sibyl/auth/mcp_oauth.py
      - packages/python/sibyl-core/src/sibyl_core/tools/**/*.py
      - pyproject.toml

  storage-access-test:
    command: uv run pytest tools/tests/test_no_direct_storage_access.py -v
    inputs:
      - tools/**/*.py
      - pyproject.toml

  baseline-capture:
    command: uv run python -m tools.baselines.capture
    inputs:
      - tools/**/*.py
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - baselines/**/*.jsonl
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml
    outputs:
      - baselines/**/*.jsonl
      - baselines/manifest.json

  baseline-seed:
    command: uv run python -m tools.baselines.seed
    inputs:
      - tools/**/*.py
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml
    outputs:
      - .moon/cache/baseline-runtime-manifest.json

  baseline-replay:
    command: uv run python -m tools.baselines.replay
    inputs:
      - tools/**/*.py
      - baselines/**/*.jsonl
      - baselines/manifest.json
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  baseline-replay-runtime:
    command:
      uv run python -m tools.baselines.replay --manifest-path
      .moon/cache/baseline-runtime-manifest.json
    inputs:
      - tools/**/*.py
      - baselines/**/*.jsonl
      - .moon/cache/baseline-runtime-manifest.json
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  baseline-test:
    command: uv run pytest tools/tests/test_baselines.py -v
    inputs:
      - tools/**/*.py
      - pyproject.toml

  memory-trust-gate:
    command: uv run python -m tools.trust.memory_trust_gate
    options:
      cache: false

  memory-trust-gate-test:
    command: uv run pytest tools/tests/test_memory_trust_gate.py -v
    inputs:
      - tools/trust/**/*.py
      - tools/tests/conftest.py
      - tools/tests/test_memory_trust_gate.py
      - pyproject.toml
      - moon.yml

  autonomy-gate:
    command: uv run python -m tools.trust.autonomy_gate
    options:
      cache: false

  autonomy-gate-test:
    command: uv run pytest tools/tests/test_autonomy_gate.py -v
    inputs:
      - tools/trust/**/*.py
      - tools/tests/conftest.py
      - tools/tests/test_autonomy_gate.py
      - pyproject.toml
      - moon.yml
      - apps/api/moon.yml
      - apps/cli/moon.yml
      - packages/python/sibyl-core/moon.yml

  auth-session-gate:
    command: uv run python -m tools.trust.auth_session_gate
    options:
      cache: false

  auth-session-gate-test:
    command: uv run pytest tools/tests/test_auth_session_gate.py -v
    inputs:
      - tools/trust/**/*.py
      - tools/tests/conftest.py
      - tools/tests/test_auth_session_gate.py
      - pyproject.toml
      - moon.yml
      - apps/api/moon.yml
      - apps/cli/moon.yml

  synthesis-gate:
    command: uv run python -m tools.trust.synthesis_gate
    options:
      cache: false

  synthesis-gate-test:
    command: uv run pytest tools/tests/test_synthesis_gate.py -v
    inputs:
      - tools/trust/**/*.py
      - tools/tests/conftest.py
      - tools/tests/test_synthesis_gate.py
      - pyproject.toml
      - moon.yml
      - packages/python/sibyl-core/moon.yml

  adapter-ingest-gate:
    command: uv run python -m tools.trust.adapter_ingest_gate
    options:
      cache: false

  adapter-ingest-gate-test:
    command: uv run pytest tools/tests/test_adapter_ingest_gate.py -v
    inputs:
      - tools/trust/**/*.py
      - tools/tests/conftest.py
      - tools/tests/test_adapter_ingest_gate.py
      - pyproject.toml
      - moon.yml
      - packages/python/sibyl-core/moon.yml

  migrate-rehearse:
    command: uv run sibyld migrate rehearse
    inputs:
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - tools/**/*.py
      - baselines/**/*.jsonl
      - .moon/cache/baseline-runtime-manifest.json
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  migrate-cutover:
    command: uv run sibyld migrate cutover
    inputs:
      - apps/api/src/**/*.py
      - packages/python/sibyl-core/src/**/*.py
      - tools/**/*.py
      - baselines/**/*.jsonl
      - .moon/cache/baseline-runtime-manifest.json
      - pyproject.toml
      - apps/api/pyproject.toml
      - packages/python/sibyl-core/pyproject.toml

  auth-flow-replay:
    command: uv run sibyld migrate auth-flow
    inputs:
      - apps/api/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml

  auth-flow-compare:
    command: uv run sibyld migrate auth-flow-compare
    inputs:
      - apps/api/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml

  auth-readonly:
    command: uv run sibyld migrate auth-readonly
    inputs:
      - apps/api/src/**/*.py
      - pyproject.toml
      - apps/api/pyproject.toml

  # ==========================================================================
  # Coverage
  # ==========================================================================
  coverage:
    deps:
      - api:test-cov
      - cli:test-cov
      - core:test-cov
      - web:test-cov

  bench-retrieval:
    deps:
      - core:bench-retrieval

  bench-live:
    command: uv run python benchmarks/live_runtime_eval.py

  bench-live-smoke:
    command: uv run pytest packages/python/sibyl-core/tests/test_retrieval_live.py -v -s

  # ==========================================================================
  # E2E Testing
  # ==========================================================================
  e2e-up:
    command: docker compose -f compose.e2e.yml up -d
    preset: server

  e2e-down:
    command: docker compose -f compose.e2e.yml down -v
    preset: server
