# https://moonrepo.dev/docs/config/project
$schema: https://moonrepo.dev/schemas/project.json

language: other
layer: configuration

tasks:
  # ==========================================================================
  # Development
  # ==========================================================================
  dev:
    command: bash tools/dev/run-surreal-dev.sh
    env:
      FORCE_COLOR: "1"
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
    preset: server
    options:
      persistent: true

  dev-lan:
    command: bash tools/dev/run-surreal-dev.sh --lan
    env:
      FORCE_COLOR: "1"
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
    preset: server
    options:
      persistent: true

  # Alias kept for muscle memory; will be removed in a future release.
  dev-surreal:
    command: bash tools/dev/run-surreal-dev.sh
    env:
      FORCE_COLOR: "1"
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
    preset: server
    options:
      persistent: true

  dev-api:
    script: |
      docker compose --env-file /dev/null up -d surrealdb
      sleep 1
      uv run --directory apps/api sibyld serve --reload
    env:
      SIBYL_STORE: "surreal"
      SIBYL_COORDINATION_BACKEND: "local"
      SIBYL_SURREAL_URL: "ws://127.0.0.1:8000/rpc"
      SIBYL_SURREAL_USERNAME: "root"
      SIBYL_SURREAL_PASSWORD: "root"
      SIBYL_EMAIL_OUTBOX_PATH: ".moon/cache/auth-flow-email-outbox.jsonl"
    preset: server
    options:
      persistent: true

  dev-web:
    command: moon run web:dev
    preset: server
    options:
      persistent: true

  stop:
    command: bash tools/dev/stop-dev.sh
    preset: server

  # ==========================================================================
  # Docker
  # ==========================================================================
  docker-up:
    command: docker compose --env-file /dev/null up -d
    preset: server

  docker-down:
    command: docker compose --env-file /dev/null down
    preset: server

  docker-logs:
    command: docker compose --env-file /dev/null logs -f
    preset: server
    options:
      persistent: true

  # ==========================================================================
  # Quickstart (uses GHCR images - same as end-users)
  # ==========================================================================
  quickstart:
    script: |
      docker compose --env-file /dev/null -f docker-compose.quickstart.yml up -d
      echo ""
      echo "🔮 Sibyl quickstart running!"
      echo "   Web UI:   http://localhost:${SIBYL_WEB_PORT:-3337}"
      echo "   API:      http://localhost:${SIBYL_SERVER_PORT:-3334}"
      echo "   SurrealDB: http://localhost:${SIBYL_SURREAL_PORT:-8000}"
    preset: server

  quickstart-stop:
    command: docker compose --env-file /dev/null -f docker-compose.quickstart.yml down
    preset: server

  quickstart-logs:
    command: docker compose --env-file /dev/null -f docker-compose.quickstart.yml logs -f
    preset: server
    options:
      persistent: true

  # Test instance (runs alongside dev on different ports)
  quickstart-test:
    script: |
      docker compose --env-file /dev/null -f docker-compose.quickstart.yml -f docker-compose.quickstart.test.yml up -d
      echo ""
      echo "🧪 Sibyl TEST instance running (separate from dev)!"
      echo "   Web UI:    http://localhost:3347"
      echo "   API:       http://localhost:3344"
      echo "   SurrealDB: http://localhost:8010"
    preset: server

  quickstart-test-stop:
    command: >-
      docker compose --env-file /dev/null -f docker-compose.quickstart.yml -f
      docker-compose.quickstart.test.yml down
    preset: server

  quickstart-test-logs:
    command: >-
      docker compose --env-file /dev/null -f docker-compose.quickstart.yml -f
      docker-compose.quickstart.test.yml logs -f
    preset: server
    options:
      persistent: true

  quickstart-pull:
    command: docker compose --env-file /dev/null -f docker-compose.quickstart.yml pull
    preset: server

  # ==========================================================================
  # Installation
  # ==========================================================================
  install:
    deps:
      - cli:install
      - api:install
    preset: server

  install-dev:
    deps:
      - cli:install-dev
      - api:install-dev
    preset: server

  # ==========================================================================
  # Formatting (aggregates individual project tasks)
  # ==========================================================================
  format:
    command: "npx prettier --write '*.md' '*.yml' '*.yaml'"
    inputs:
      - "*.md"
      - "*.yml"
      - "*.yaml"
    preset: server

  fmt:
    deps:
      - root:format
      - docs:format
      - skills:format
      - infra:format
    preset: server

  fmt-check:
    deps:
      - docs:lint
      - skills:lint
      - infra:lint

