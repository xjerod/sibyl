name: Nightly Regression

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline-parity:
    name: Baseline Parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SIBYL_ENVIRONMENT: production
      SIBYL_JWT_SECRET: test-secret-for-nightly
      SIBYL_FALKORDB_HOST: localhost
      SIBYL_FALKORDB_PORT: 6380
      SIBYL_FALKORDB_PASSWORD: ""
      SIBYL_POSTGRES_HOST: localhost
      SIBYL_POSTGRES_PORT: 5433
      SIBYL_POSTGRES_USER: sibyl_ci
      SIBYL_POSTGRES_PASSWORD: sibyl_ci_password
      SIBYL_POSTGRES_DB: sibyl_ci
      SIBYL_OPENAI_API_KEY: sk-test-key
      SIBYL_ANTHROPIC_API_KEY: sk-ant-test-key
      SIBYL_MOCK_LLM: true
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
      postgres:
        image: pgvector/pgvector:pg18
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: sibyl_ci
          POSTGRES_PASSWORD: sibyl_ci_password
          POSTGRES_DB: sibyl_ci
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true

      - name: Warm up proto toolchain
        run: |
          proto use --log debug
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          uv --version

      - name: Cache moon outputs
        uses: actions/cache@v5
        with:
          path: .moon/cache
          key: moon-nightly-${{ runner.os }}-${{ hashFiles('.prototools', 'apps/api/uv.lock') }}
          restore-keys: |
            moon-nightly-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-nightly-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-nightly-${{ runner.os }}-

      - name: Run database migrations
        run: moon run api:db-migrate

      - name: Start backend server
        run: |
          cd apps/api
          uv run sibyld serve > /tmp/sibyld.log 2>&1 &
          echo "Waiting for backend to start..."
          for i in {1..60}; do
            if curl -fsS http://localhost:3334/api/health > /dev/null; then
              echo "Backend is ready!"
              sleep 2
              break
            fi
            echo "Attempt $i: Backend not ready yet..."
            sleep 1
          done
          curl -fsS http://localhost:3334/api/health | head -c 200

      - name: Start background job worker
        run: |
          cd apps/api
          uv run sibyld worker > /tmp/sibyl-worker.log 2>&1 &
          echo "Background job worker started"
          sleep 2

      - name: Seed deterministic baseline fixture
        run: moon run baseline-seed

      - name: Replay committed baseline corpus
        run: moon run baseline-replay-runtime

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          container_id="$(docker ps -q --filter ancestor=falkordb/falkordb:latest | head -n 1)"
          echo "=== Backend server logs ==="
          tail -n 200 /tmp/sibyld.log || true
          echo ""
          echo "=== Worker logs ==="
          tail -n 200 /tmp/sibyl-worker.log || true
          echo ""
          echo "=== FalkorDB graph contents ==="
          if [[ -n "$container_id" ]]; then
            docker exec "$container_id" redis-cli GRAPH.QUERY default "MATCH (n) RETURN labels(n), count(*) LIMIT 10" || echo "Could not query FalkorDB"
          else
            echo "Could not find FalkorDB container"
          fi

  live-graph:
    name: Live Graph Regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SIBYL_ENVIRONMENT: production
      SIBYL_JWT_SECRET: test-secret-for-nightly
      SIBYL_FALKORDB_HOST: localhost
      SIBYL_FALKORDB_PORT: 6380
      SIBYL_FALKORDB_PASSWORD: ""
      SIBYL_POSTGRES_HOST: localhost
      SIBYL_POSTGRES_PORT: 5433
      SIBYL_POSTGRES_USER: sibyl_ci
      SIBYL_POSTGRES_PASSWORD: sibyl_ci_password
      SIBYL_POSTGRES_DB: sibyl_ci
      SIBYL_OPENAI_API_KEY: ${{ secrets.SIBYL_OPENAI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.SIBYL_OPENAI_API_KEY }}
      SIBYL_ANTHROPIC_API_KEY: ${{ secrets.SIBYL_ANTHROPIC_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.SIBYL_ANTHROPIC_API_KEY }}
      SIBYL_MOCK_LLM: false
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
      postgres:
        image: pgvector/pgvector:pg18
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: sibyl_ci
          POSTGRES_PASSWORD: sibyl_ci_password
          POSTGRES_DB: sibyl_ci
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true

      - name: Warm up proto toolchain
        run: |
          proto use --log debug
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          uv --version

      - name: Cache moon outputs
        uses: actions/cache@v5
        with:
          path: .moon/cache
          key: moon-live-${{ runner.os }}-${{ hashFiles('.prototools', 'apps/api/uv.lock') }}
          restore-keys: |
            moon-live-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-live-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-live-${{ runner.os }}-

      - name: Run database migrations
        run: moon run api:db-migrate

      - name: Run live graph regression suite
        run: moon run api:test-live
