name: Nightly Regression

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_PROJECT_NAME: sibyl-ci

jobs:
  baseline-parity:
    name: Baseline Parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SIBYL_ENVIRONMENT: production
      SIBYL_JWT_SECRET: test-secret-for-nightly
      SIBYL_STORE: surreal
      SIBYL_AUTH_STORE: surreal
      SIBYL_COORDINATION_BACKEND: local
      SIBYL_SURREAL_URL: ws://localhost:8000/rpc
      SIBYL_SURREAL_USERNAME: root
      SIBYL_SURREAL_PASSWORD: root
      SIBYL_OPENAI_API_KEY: sk-test-key
      SIBYL_ANTHROPIC_API_KEY: sk-ant-test-key
      SIBYL_MOCK_LLM: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Start SurrealDB
        uses: ./.github/actions/start-surrealdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: surreal-ci-v1

      - name: Verify toolchain
        run: |
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          moon --version
          proto --version
          uv --version

      - name: Cache moon outputs
        uses: actions/cache@v5
        with:
          path: .moon/cache
          key: moon-nightly-${{ runner.os }}-${{ hashFiles('.prototools', 'uv.lock') }}
          restore-keys: |
            moon-nightly-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-nightly-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-nightly-${{ runner.os }}-

      - name: Start backend server
        run: |
          cd apps/api
          uv run sibyld serve > /tmp/sibyld.log 2>&1 &
          echo "Waiting for backend to start..."
          for i in {1..60}; do
            if curl -fsS http://localhost:3334/api/health > /dev/null; then
              echo "Backend is ready!"
              sleep 2
              break
            fi
            echo "Attempt $i: Backend not ready yet..."
            sleep 1
          done
          curl -fsS http://localhost:3334/api/health | head -c 200

      - name: Start background job worker
        run: |
          cd apps/api
          uv run sibyld worker > /tmp/sibyl-worker.log 2>&1 &
          echo "Background job worker started"
          sleep 2

      - name: Seed deterministic baseline fixture
        run: moon run baseline-seed

      - name: Replay committed baseline corpus
        run: moon run baseline-replay-runtime

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== Backend server logs ==="
          tail -n 200 /tmp/sibyld.log || true
          echo ""
          echo "=== Worker logs ==="
          tail -n 200 /tmp/sibyl-worker.log || true
          echo ""
          echo "=== SurrealDB logs ==="
          docker compose logs surrealdb || true

  live-graph:
    name: Live Graph Regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SIBYL_ENVIRONMENT: production
      SIBYL_JWT_SECRET: test-secret-for-nightly
      SIBYL_STORE: surreal
      SIBYL_AUTH_STORE: surreal
      SIBYL_COORDINATION_BACKEND: local
      SIBYL_SURREAL_URL: ws://localhost:8000/rpc
      SIBYL_SURREAL_USERNAME: root
      SIBYL_SURREAL_PASSWORD: root
      SIBYL_OPENAI_API_KEY: sk-test-key
      SIBYL_ANTHROPIC_API_KEY: sk-ant-test-key
      SIBYL_MOCK_LLM: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Start SurrealDB
        uses: ./.github/actions/start-surrealdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: surreal-ci-v1

      - name: Verify toolchain
        run: |
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          moon --version
          proto --version
          uv --version

      - name: Cache moon outputs
        uses: actions/cache@v5
        with:
          path: .moon/cache
          key: moon-live-${{ runner.os }}-${{ hashFiles('.prototools', 'uv.lock') }}
          restore-keys: |
            moon-live-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-live-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-live-${{ runner.os }}-

      - name: Run live graph regression suite
        run: moon run api:test-live
