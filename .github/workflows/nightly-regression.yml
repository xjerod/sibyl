name: Nightly Regression

on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_PROJECT_NAME: sibyl-ci

jobs:
  baseline-parity:
    name: Baseline Parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SIBYL_ENVIRONMENT: production
      SIBYL_JWT_SECRET: test-secret-for-nightly
      SIBYL_STORE: surreal
      SIBYL_AUTH_STORE: surreal
      SIBYL_LOCAL_AUTH_ENABLED: "true"
      SIBYL_COORDINATION_BACKEND: local
      SIBYL_SURREAL_URL: ws://localhost:8000/rpc
      SIBYL_SURREAL_USERNAME: sibyl_ci
      SIBYL_SURREAL_PASSWORD: sibyl_ci_password
      SIBYL_RETRIEVAL_MODE: compare
      SIBYL_OPENAI_API_KEY: sk-test-key
      SIBYL_ANTHROPIC_API_KEY: sk-ant-test-key
      SIBYL_MOCK_LLM: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Start SurrealDB
        uses: ./.github/actions/start-surrealdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: surreal-ci-v1

      - name: Verify toolchain
        run: |
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          moon --version
          proto --version
          uv --version

      - name: Cache moon outputs
        uses: actions/cache@v5
        with:
          path: .moon/cache
          key: moon-nightly-${{ runner.os }}-${{ hashFiles('.prototools', 'uv.lock') }}
          restore-keys: |
            moon-nightly-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-nightly-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-nightly-${{ runner.os }}-

      - name: Cache retrieval mode history
        uses: actions/cache@v5
        with:
          path: .moon/retrieval-mode-history.json
          key: retrieval-mode-history-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            retrieval-mode-history-

      - name: Start backend server
        run: |
          cd apps/api
          uv run sibyld serve > /tmp/sibyld.log 2>&1 &
          echo "Waiting for backend to start..."
          for i in {1..60}; do
            if curl -fsS http://localhost:3334/api/health > /dev/null; then
              echo "Backend is ready!"
              sleep 2
              break
            fi
            echo "Attempt $i: Backend not ready yet..."
            sleep 1
          done
          curl -fsS http://localhost:3334/api/health | head -c 200

      - name: Start background job worker
        run: |
          cd apps/api
          uv run sibyld worker > /tmp/sibyl-worker.log 2>&1 &
          echo "Background job worker started"
          sleep 2

      - name: Seed deterministic baseline fixture
        run: moon run baseline-seed

      - name: Replay committed baseline corpus
        run: moon run baseline-replay-runtime

      - name: Run context-pack retrieval compare benchmark
        id: context-pack-compare
        run: |
          set +e
          moon run core:bench-context -- \
            --cases benchmarks/context_pack_cases.json \
            --auth-manifest .moon/cache/baseline-runtime-manifest.json \
            --label retrieval-compare \
            --repeat 20 \
            --metadata retrieval_mode=compare
          bench_status="$?"
          set -e

          latest_report="$(
            find .moon/cache/evals -maxdepth 1 \
              -name 'eval_context_pack_retrieval_compare_*.json' \
              -printf '%T@ %p\n' \
              | sort -nr \
              | head -1 \
              | cut -d' ' -f2-
          )"
          test -n "$latest_report"
          echo "report=$latest_report" >> "$GITHUB_OUTPUT"

          if [[ "$bench_status" -ne 0 ]]; then
            python - "$latest_report" <<'PY'
          import json
          import sys

          report = json.load(open(sys.argv[1], encoding="utf-8"))
          failures = [case for case in report.get("per_case", []) if not case.get("passed")]
          print()
          print("Context-pack failures")
          seen = set()
          for case in failures:
              reasons = tuple(case.get("failures") or [])
              key = (case.get("name"), reasons)
              if key in seen:
                  continue
              seen.add(key)
              print(f"  {case.get('name')} repeat {case.get('repeat_index')}:")
              for reason in reasons:
                  print(f"    - {reason}")
          PY
            exit "$bench_status"
          fi

          moon run bench-gate -- "$latest_report" --profile context-pack \
            --require-metadata retrieval_mode=compare \
            --require-metadata repeat_count=20
          history_args=()
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            history_args+=(--allow-non-main)
          fi

          moon run retrieval-mode-history -- "$latest_report" \
            --branch "${GITHUB_REF_NAME}" \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --event "${GITHUB_EVENT_NAME}" \
            --workflow "${GITHUB_WORKFLOW}" \
            "${history_args[@]}"

      - name: Record baseline parity receipt
        if: always()
        run: |
          mkdir -p .moon/cache/nightly
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "job=baseline-parity"
            echo "candidate_sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF_NAME}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > .moon/cache/nightly/baseline-parity-receipt.txt

      - name: Upload baseline parity receipt
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: baseline-parity-receipt-${{ github.sha }}
          path: .moon/cache/nightly/baseline-parity-receipt.txt
          if-no-files-found: error

      - name: Upload context-pack retrieval compare report
        if: always() && steps.context-pack-compare.outputs.report != ''
        uses: actions/upload-artifact@v7
        with:
          name: context-pack-retrieval-compare
          path: ${{ steps.context-pack-compare.outputs.report }}

      - name: Upload retrieval mode history
        uses: actions/upload-artifact@v7
        with:
          name: retrieval-mode-history
          path: .moon/retrieval-mode-history.json

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== Backend server logs ==="
          tail -n 200 /tmp/sibyld.log || true
          echo ""
          echo "=== Worker logs ==="
          tail -n 200 /tmp/sibyl-worker.log || true
          echo ""
          echo "=== SurrealDB logs ==="
          docker compose --env-file /dev/null logs surrealdb || true

  live-graph:
    name: Live Graph Regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SIBYL_ENVIRONMENT: production
      SIBYL_JWT_SECRET: test-secret-for-nightly
      SIBYL_STORE: surreal
      SIBYL_AUTH_STORE: surreal
      SIBYL_COORDINATION_BACKEND: local
      SIBYL_SURREAL_URL: ws://localhost:8000/rpc
      SIBYL_SURREAL_USERNAME: sibyl_ci
      SIBYL_SURREAL_PASSWORD: sibyl_ci_password
      SIBYL_OPENAI_API_KEY: sk-test-key
      SIBYL_ANTHROPIC_API_KEY: sk-ant-test-key
      SIBYL_MOCK_LLM: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Start SurrealDB
        uses: ./.github/actions/start-surrealdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: surreal-ci-v1

      - name: Verify toolchain
        run: |
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          moon --version
          proto --version
          uv --version

      - name: Cache moon outputs
        uses: actions/cache@v5
        with:
          path: .moon/cache
          key: moon-live-${{ runner.os }}-${{ hashFiles('.prototools', 'uv.lock') }}
          restore-keys: |
            moon-live-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-live-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-live-${{ runner.os }}-

      - name: Run live graph regression suite
        run: moon run api:test-live

      - name: Record live graph receipt
        if: always()
        run: |
          mkdir -p .moon/cache/nightly
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "job=live-graph"
            echo "candidate_sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF_NAME}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > .moon/cache/nightly/live-graph-receipt.txt

      - name: Upload live graph receipt
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-graph-receipt-${{ github.sha }}
          path: .moon/cache/nightly/live-graph-receipt.txt
          if-no-files-found: error

  restore-to-scratch:
    name: Restore To Scratch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * 1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SIBYL_ENVIRONMENT: production
      SIBYL_JWT_SECRET: test-secret-for-nightly
      SIBYL_STORE: surreal
      SIBYL_AUTH_STORE: surreal
      SIBYL_COORDINATION_BACKEND: local
      SIBYL_SURREAL_URL: ws://localhost:8000/rpc
      SIBYL_SURREAL_USERNAME: sibyl_ci
      SIBYL_SURREAL_PASSWORD: sibyl_ci_password
      SIBYL_OPENAI_API_KEY: sk-test-key
      SIBYL_ANTHROPIC_API_KEY: sk-ant-test-key
      SIBYL_MOCK_LLM: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Start SurrealDB
        uses: ./.github/actions/start-surrealdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: restore-to-scratch-v1

      - name: Verify toolchain
        run: |
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          moon --version
          proto --version
          uv --version

      - name: Cache moon outputs
        uses: actions/cache@v5
        with:
          path: .moon/cache
          key: moon-restore-${{ runner.os }}-${{ hashFiles('.prototools', 'uv.lock') }}
          restore-keys: |
            moon-restore-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-restore-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-restore-${{ runner.os }}-

      - name: Run backup restore-to-scratch gate
        run: moon run backup-restore-gate

      - name: Record restore-to-scratch receipt
        if: always()
        run: |
          mkdir -p .moon/cache/nightly
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "job=restore-to-scratch"
            echo "candidate_sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF_NAME}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "event=${GITHUB_EVENT_NAME}"
            echo "completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > .moon/cache/nightly/restore-to-scratch-receipt.txt

      - name: Upload backup restore receipt
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backup-restore-gate-receipt-${{ github.sha }}
          path: .moon/cache/backup-restore-gate/receipt.json
          if-no-files-found: error

      - name: Upload restore-to-scratch receipt
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: restore-to-scratch-receipt-${{ github.sha }}
          path: .moon/cache/nightly/restore-to-scratch-receipt.txt
          if-no-files-found: error
