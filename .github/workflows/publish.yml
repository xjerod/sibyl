name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v0.1.2)"
        required: true
        type: string
      dry_run:
        description: "Dry run (build but don't publish)"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  rc-gate:
    name: "◆ RC Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Install system dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: "◇ Setup moonrepo toolchain"
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: publish-rc-v1

      - name: "◇ Verify toolchain"
        run: |
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          moon --version
          proto --version
          uv --version

      - name: "◇ Cache moon outputs"
        uses: actions/cache@v5
        with:
          path: |
            .moon/cache
            apps/web/.next/cache
          key:
            moon-publish-${{ runner.os }}-${{ hashFiles('.prototools', 'uv.lock',
            'apps/web/pnpm-lock.yaml') }}
          restore-keys: |
            moon-publish-${{ runner.os }}-

      - name: "◇ Cache pnpm store"
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-publish-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-publish-${{ runner.os }}-

      - name: "◇ Cache uv"
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-publish-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-publish-${{ runner.os }}-

      - name: "◇ Install Node dependencies"
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: "◆ Run RC gate bundle"
        run: moon run :check

  # =========================================================================
  # Python: build + publish to PyPI
  # =========================================================================
  python:
    name: "◆ Python: Build & Publish"
    needs: rc-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # PyPI trusted publishing
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: "◇ Install uv"
        uses: astral-sh/setup-uv@v6

      - name: "△ Build Python packages"
        run: |
          echo "Building sibyl-core..."
          uv build --package sibyl-core --out-dir dist/
          echo "Building sibyl-dev..."
          uv build --package sibyl-dev --out-dir dist/
          ls -la dist/

      - name: "► Publish to PyPI"
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # =========================================================================
  # Docker: build each (image, platform) on its native runner, push by digest
  # =========================================================================
  docker-build:
    name: "△ Docker: ${{ matrix.image }} (${{ matrix.platform }})"
    needs: rc-gate
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [api, web]
        platform: [amd64, arm64]
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "◇ Login to GHCR"
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "△ Build & push by digest"
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.image }}/Dockerfile
          platforms: linux/${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=${{ !inputs.dry_run }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: "△ Export digest"
        if: ${{ !inputs.dry_run }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: "► Upload digest"
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # =========================================================================
  # Docker: merge per-arch digests into multi-arch manifest with final tags
  # =========================================================================
  docker-merge:
    name: "► Docker: Merge ${{ matrix.image }}"
    needs: docker-build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [api, web]
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: "► Download digests"
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: "◇ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "◇ Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "► Create manifest list"
        working-directory: /tmp/digests
        env:
          REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${REPO}:latest" \
            -t "${REPO}:${VERSION}" \
            $(printf "${REPO}@sha256:%s " *)

      - name: "△ Inspect image"
        env:
          REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: docker buildx imagetools inspect "${REPO}:${VERSION}"

  # =========================================================================
  # Release: update GitHub release with install instructions
  # =========================================================================
  release:
    name: "◆ Release: Update"
    needs: [python, docker-merge]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: "◆ Update release with install instructions"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          append_body: |

            ## Install

            **CLI (recommended)**
            ```bash
            uv tool install sibyl-dev
            ```

            **Docker**
            ```bash
            docker pull ghcr.io/hyperb1iss/sibyl-api:${{ steps.version.outputs.version }}
            docker pull ghcr.io/hyperb1iss/sibyl-web:${{ steps.version.outputs.version }}
            ```

      - name: "► Summary"
        run: |
          echo "## Publish ${{ inputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python Packages" >> $GITHUB_STEP_SUMMARY
          echo "- [sibyl-core](https://pypi.org/project/sibyl-core/${{ steps.version.outputs.version }}/)" >> $GITHUB_STEP_SUMMARY
          echo "- [sibyl-dev](https://pypi.org/project/sibyl-dev/${{ steps.version.outputs.version }}/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images (multi-arch: linux/amd64, linux/arm64)" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/hyperb1iss/sibyl-api:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/hyperb1iss/sibyl-web:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
