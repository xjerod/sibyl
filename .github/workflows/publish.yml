name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v0.1.2)"
        required: true
        type: string
      dry_run:
        description: "Dry run (build but don't publish)"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # =========================================================================
  # RC Gate: direct publish dispatches must prove the tagged checkout first
  # =========================================================================
  rc-gate:
    name: "◇ RC Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Install system dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: "◇ Setup moonrepo toolchain"
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: publish-rc-gate-v1

      - name: "◇ Verify toolchain"
        run: |
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          moon --version
          proto --version
          uv --version

      - name: "◇ Install Node dependencies"
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: "◇ Sync Python workspace"
        run: uv sync --locked --all-packages

      - name: "◇ Run RC gate bundle"
        run: moon run :check

  # =========================================================================
  # Python: build + publish to PyPI
  # =========================================================================
  python:
    name: "◆ Python: Build & Publish"
    needs: rc-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # PyPI trusted publishing
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: "◇ Install uv"
        uses: astral-sh/setup-uv@v6

      - name: "◇ Setup moonrepo toolchain"
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: publish-python-v1

      - name: "△ Build Python packages"
        run: moon run python-package-build

      - name: "► Publish to PyPI"
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # =========================================================================
  # Homebrew: generate the tap formula from published PyPI artifacts
  # =========================================================================
  homebrew:
    name: "► Homebrew: Update tap"
    needs: python
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: "◆ Checkout Sibyl"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: "◇ Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: "△ Extract and validate version from tag"
        id: version
        env:
          TAG: ${{ inputs.tag }}
        run: |
          version="${TAG#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Expected: vX.Y.Z or vX.Y.Z-suffix"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: "◆ Checkout Homebrew tap"
        uses: actions/checkout@v6
        with:
          repository: hyperb1iss/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          persist-credentials: false

      - name: "△ Generate formula"
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python tools/release/homebrew_formula.py \
            --version "$VERSION" \
            --output homebrew-tap/Formula/sibyl.rb

      - name: "► Commit tap update"
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/sibyl.rb; then
            echo "Formula/sibyl.rb already matches v$VERSION"
            exit 0
          fi

          git add Formula/sibyl.rb
          git commit \
            -m "feat: update sibyl to v$VERSION" \
            -m "Generate the formula from the published PyPI artifacts." \
            -m "The tap now installs both the sibyl CLI and sibyld daemon."
          git push

  # =========================================================================
  # AUR: generate and publish the Arch Linux package from PyPI artifacts
  # =========================================================================
  aur:
    name: "► AUR: Update package"
    needs: python
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: "◆ Checkout Sibyl"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: "◇ Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: "△ Generate PKGBUILD"
        run: |
          python tools/release/aur_pkgbuild.py \
            --version "${{ steps.version.outputs.version }}" \
            --output PKGBUILD

      - name: "► Publish to AUR"
        uses: KSXGitHub/github-actions-deploy-aur@abe8ac26b51011c88be58c8809fd2ac674068ea5 # v4.1.2
        with:
          pkgname: sibyl
          pkgbuild: ./PKGBUILD
          commit_username: Stefanie Jane
          commit_email: stef@hyperbliss.tech
          commit_message: "Update to ${{ steps.version.outputs.version }}"
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}

  # =========================================================================
  # Docker: build each (image, platform) on its native runner, push by digest
  # =========================================================================
  docker-build:
    name: "△ Docker: ${{ matrix.image }} (${{ matrix.platform }})"
    needs: rc-gate
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [api, web]
        platform: [amd64, arm64]
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "◇ Login to GHCR"
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "△ Build & push by digest"
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.image }}/Dockerfile
          platforms: linux/${{ matrix.platform }}
          outputs: >-
            type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/sibyl-${{
            matrix.image }},push-by-digest=true,name-canonical=true,push=${{ !inputs.dry_run }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: "△ Export digest"
        if: ${{ !inputs.dry_run }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: "► Upload digest"
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # =========================================================================
  # Docker: merge per-arch digests into multi-arch manifest with final tags
  # =========================================================================
  docker-merge:
    name: "► Docker: Merge ${{ matrix.image }}"
    needs: docker-build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [api, web]
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: "► Download digests"
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: "◇ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "◇ Login to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "► Create manifest list"
        working-directory: /tmp/digests
        env:
          REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${REPO}:latest" \
            -t "${REPO}:${VERSION}" \
            $(printf "${REPO}@sha256:%s " *)

      - name: "△ Inspect image"
        env:
          REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: docker buildx imagetools inspect "${REPO}:${VERSION}"

  # =========================================================================
  # Docker: generate SBOMs and fail on high/critical CVEs before signing
  # =========================================================================
  docker-security:
    name: "◆ Docker: Security ${{ matrix.image }}"
    needs: docker-merge
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        image: [api, web]
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: "◇ Login to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "◆ Generate Trivy SBOM"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: >-
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/sibyl-${{
            matrix.image }}:${{ steps.version.outputs.version }}
          format: cyclonedx
          output: sibyl-${{ matrix.image }}-${{ steps.version.outputs.version }}.cdx.json
          scanners: vuln

      - name: "► Upload SBOM"
        uses: actions/upload-artifact@v4
        with:
          name: sibyl-${{ matrix.image }}-${{ steps.version.outputs.version }}-sbom
          path: sibyl-${{ matrix.image }}-${{ steps.version.outputs.version }}.cdx.json
          if-no-files-found: error
          retention-days: 90

      - name: "◆ Trivy CVE gate"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: >-
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/sibyl-${{
            matrix.image }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # =========================================================================
  # Docker: keyless Sigstore signatures for the scanned multi-arch images
  # =========================================================================
  docker-sign:
    name: "◆ Docker: Sign ${{ matrix.image }}"
    needs: docker-security
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      matrix:
        image: [api, web]
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: "◇ Setup Cosign"
        uses: sigstore/cosign-installer@v4.1.1

      - name: "◇ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "◇ Login to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "◆ Sign image digest"
        env:
          REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          digest="$(
            docker buildx imagetools inspect "${REPO}:${VERSION}" \
              --format '{{json .Manifest.Digest}}' \
              | tr -d '"'
          )"
          test -n "$digest"
          image_ref="${REPO}@${digest}"
          cosign sign --yes "${image_ref}"
          mkdir -p cosign-receipts
          receipt="cosign-receipts/sibyl-${{ matrix.image }}-${VERSION}-cosign-receipt.json"
          IMAGE="${{ matrix.image }}" REPO="$REPO" VERSION="$VERSION" DIGEST="$digest" IMAGE_REF="$image_ref" RECEIPT="$receipt" python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          payload = {
              "status": "PASS",
              "signer": "github-actions-oidc-keyless",
              "image": os.environ["IMAGE"],
              "repository": os.environ["REPO"],
              "version": os.environ["VERSION"],
              "digest": os.environ["DIGEST"],
              "image_ref": os.environ["IMAGE_REF"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_sha": os.environ["GITHUB_SHA"],
              "workflow_ref": os.environ["GITHUB_REF"],
              "signed_at": datetime.now(UTC).isoformat(),
          }
          Path(os.environ["RECEIPT"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: "► Upload Cosign receipt"
        uses: actions/upload-artifact@v4
        with:
          name: sibyl-${{ matrix.image }}-${{ steps.version.outputs.version }}-cosign
          path: cosign-receipts/sibyl-${{ matrix.image }}-${{ steps.version.outputs.version }}-cosign-receipt.json
          if-no-files-found: error
          retention-days: 90

  # =========================================================================
  # Release: update GitHub release with install instructions
  # =========================================================================
  release:
    name: "◆ Release: Update"
    needs: [python, homebrew, aur, docker-sign]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: "► Download image evidence"
        uses: actions/download-artifact@v4
        with:
          path: release-evidence
          pattern: sibyl-*-${{ steps.version.outputs.version }}-*
          merge-multiple: true

      - name: "◇ Prepare release evidence assets"
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find release-evidence -type f \( \
            -name "*.cdx.json" -o \
            -name "*-cosign-receipt.json" \
          \) -exec cp {} release-assets/ \;
          test "$(find release-assets -maxdepth 1 -type f -name '*.cdx.json' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -type f -name '*-cosign-receipt.json' | wc -l)" -eq 2

      - name: "◆ Update release with install instructions"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*.cdx.json
            release-assets/*-cosign-receipt.json
          append_body: |

            ## Install

            **Local server**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/hyperb1iss/sibyl/main/install.sh | sh -s -- --version ${{ steps.version.outputs.version }}
            ```

            **Remote CLI**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/hyperb1iss/sibyl/main/install.sh | sh -s -- --remote --version ${{ steps.version.outputs.version }}
            sibyl init --remote https://sibyl.example.com
            sibyl auth login
            ```

            **Homebrew**
            ```bash
            brew install hyperb1iss/tap/sibyl
            sibyl up
            ```

            **Arch Linux (AUR)**
            ```bash
            paru -S sibyl
            sibyl up
            ```

            **Headless server**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/hyperb1iss/sibyl/main/install.sh | sh -s -- --version ${{ steps.version.outputs.version }} --no-open
            ```

      - name: "► Summary"
        run: |
          echo "## Publish ${{ inputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python Packages" >> $GITHUB_STEP_SUMMARY
          echo "- [sibyl-core](https://pypi.org/project/sibyl-core/${{ steps.version.outputs.version }}/)" >> $GITHUB_STEP_SUMMARY
          echo "- [sibyl-dev](https://pypi.org/project/sibyl-dev/${{ steps.version.outputs.version }}/)" >> $GITHUB_STEP_SUMMARY
          echo "- [sibyld](https://pypi.org/project/sibyld/${{ steps.version.outputs.version }}/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Linux Packages" >> $GITHUB_STEP_SUMMARY
          echo "- [sibyl](https://aur.archlinux.org/packages/sibyl)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images (multi-arch: linux/amd64, linux/arm64)" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/hyperb1iss/sibyl-api:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/hyperb1iss/sibyl-web:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
