name: Start SurrealDB
description: Start the repo SurrealDB compose service for CI jobs.

runs:
  using: composite
  steps:
    - name: Start SurrealDB service
      shell: bash
      run: |
        set -euo pipefail

        export SURREAL_DATA_DIR="${RUNNER_TEMP}/sibyl-surrealdb"
        export SIBYL_SURREAL_PATH="${SIBYL_SURREAL_PATH:-memory}"
        mkdir -p "$SURREAL_DATA_DIR"
        chmod 777 "$SURREAL_DATA_DIR"

        docker compose up -d surrealdb

        for i in {1..30}; do
          if docker compose exec -T surrealdb /surreal is-ready --endpoint http://localhost:8000; then
            echo "SurrealDB is ready!"
            exit 0
          fi
          echo "Attempt $i: SurrealDB not ready yet..."
          sleep 1
        done

        docker compose ps || true
        docker compose logs surrealdb || true
        exit 1
