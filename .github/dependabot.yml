version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "12:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    groups:
      enterprise-auth-runtime:
        patterns:
          - "argon2-cffi"
          - "authlib"
          - "pyjwt"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "12:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "13:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
