$schema: https://moonrepo.dev/schemas/project.json
toolchains:
  default: system
language: python
tasks:
  sync:
    command: uv sync
    inputs:
    - '@group(configs)'
  lint:
    script: uv run ruff check src/ && uv run ruff format --check src/
    inputs:
    - '@group(sources)'
    - '@group(configs)'
  format:
    command: uv run ruff format src/
    inputs:
    - '@group(sources)'
  fix:
    script: uv run ruff check --fix src/ && uv run ruff format src/
    inputs:
    - '@group(sources)'
    preset: server
  fix-all:
    script: uv run ruff check --fix --unsafe-fixes src/ && uv run ruff format src/
    inputs:
    - '@group(sources)'
    preset: server
  typecheck:
    command: uv run ty check src/
    inputs:
    - '@group(sources)'
    - '@group(configs)'
  test:
    command: uv run pytest tests/ -v
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  memory-trust-test:
    command:
      uv run pytest tests/test_main_capture.py tests/test_main_search.py
      tests/test_context_pack.py tests/test_session.py -v
    inputs:
    - '@group(sources)'
    - tests/test_main_capture.py
    - tests/test_main_search.py
    - tests/test_context_pack.py
    - tests/test_session.py
  context-quality-test:
    command:
      uv run pytest tests/test_context_pack.py tests/test_session.py
      tests/test_main_capture.py::test_recall_command_outputs_markdown_context
      tests/test_main_capture.py::test_recall_command_accepts_review_intent
      tests/test_main_capture.py::test_recall_command_can_request_agent_diary_context
      -v
    inputs:
    - '@group(sources)'
    - tests/test_context_pack.py
    - tests/test_session.py
    - tests/test_main_capture.py
  workspace-trust-test:
    command:
      uv run pytest
      tests/test_main_capture.py::test_memory_inspect_command_renders_source_summary
      tests/test_main_capture.py::test_memory_import_status_command_renders_import_receipts
      tests/test_main_capture.py::test_memory_promote_preview_command_renders_decision
      tests/test_main_capture.py::test_memory_review_status_renders_runs_and_receipts
      tests/test_main_capture.py::test_synthesis_plan_command_outputs_section_summary
      tests/test_main_capture.py::test_synthesis_remember_command_requests_artifact_persistence
      -v
    inputs:
    - '@group(sources)'
    - tests/test_main_capture.py
  trust-control-test:
    command:
      uv run pytest tests/test_main_capture.py tests/test_context_pack.py -v
    inputs:
    - '@group(sources)'
    - tests/test_main_capture.py
    - tests/test_context_pack.py
  autonomy-test:
    command:
      uv run pytest
      tests/test_main_capture.py::test_memory_promote_auto_command_renders_decision
      -v
    inputs:
    - '@group(sources)'
    - tests/test_main_capture.py
  reflection-quality-test:
    command:
      uv run pytest
      tests/test_main_capture.py::test_memory_inspect_command_outputs_json
      tests/test_main_capture.py::test_memory_promote_preview_command_renders_decision
      tests/test_main_capture.py::test_memory_promote_auto_command_renders_decision
      tests/test_main_capture.py::test_memory_review_drain_command_renders_summary
      tests/test_main_capture.py::test_reflection_dream_client_posts_query_contract
      tests/test_main_capture.py::test_jobs_client_lists_function_filter
      tests/test_main_capture.py::test_memory_review_dream_command_queues_dry_run
      tests/test_main_capture.py::test_memory_review_dream_command_apply_queues_mutating_run
      tests/test_main_capture.py::test_memory_review_status_renders_runs_and_receipts
      tests/test_main_capture.py::test_reflect_command_outputs_markdown_candidates
      tests/test_main_capture.py::test_reflect_command_can_persist_review_queue
      -v
    inputs:
    - '@group(sources)'
    - tests/test_main_capture.py
  auth-session-test:
    command: uv run pytest tests/test_client_auth_refresh.py tests/test_auth_store.py -v
    inputs:
    - '@group(sources)'
    - tests/test_client_auth_refresh.py
    - tests/test_auth_store.py
  test-cov:
    command: uv run pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    outputs:
    - coverage.xml
  check:
    deps:
    - ~:lint
    - ~:typecheck
    - ~:test
  install:
    script: uv tool install . --force && sibyl skill install --quiet
  install-dev:
    script: uv tool install . --editable --force && sibyl skill install --quiet
  setup-assistants:
    command: uv run sibyl local setup
    preset: server
tags:
- python
- cli
fileGroups:
  sources:
  - src/**/*.py
  tests:
  - tests/**/*.py
  configs:
  - pyproject.toml
  - /pyproject.toml
  - moon.yml
layer: application
