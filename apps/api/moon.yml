# https://moonrepo.dev/docs/config/project
$schema: https://moonrepo.dev/schemas/project.json

language: python
layer: application
toolchains:
  default: system

fileGroups:
  sources:
    - src/**/*
  tests:
    - tests/**/*
  configs:
    - pyproject.toml
    - /pyproject.toml
    - moon.yml

tasks:
  # Linting & Formatting
  lint:
    script: uv run ruff check src tests && uv run ruff format --check src tests
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - "@group(configs)"

  format:
    command: uv run ruff format src tests
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    preset: server

  fix:
    script: uv run ruff check --fix src tests && uv run ruff format src tests
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    preset: server

  fix-all:
    script: uv run ruff check --fix --unsafe-fixes src tests && uv run ruff format src tests
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    preset: server

  # Type Checking
  typecheck:
    command: uv run ty check
    inputs:
      - "@group(sources)"
      - "@group(configs)"

  # Testing (unit tests only - e2e tests are in apps/e2e)
  test:
    command:
      uv run pytest --ignore=tests/test_communities.py --ignore=tests/test_e2e_workflows.py
      --ignore=tests/test_graph_communities_lod.py --ignore=tests/test_harness.py
      --ignore=tests/test_tools_core.py
    inputs:
      - "@group(sources)"
      - "@group(tests)"

  extended-test:
    command:
      uv run pytest tests/test_communities.py tests/test_e2e_workflows.py
      tests/test_graph_communities_lod.py tests/test_harness.py tests/test_tools_core.py -v
    inputs:
      - "@group(sources)"
      - "@group(tests)"

  memory-trust-rest-test:
    command: uv run pytest tests/test_routes_memory.py tests/test_surreal_auth_runtime.py -v
    inputs:
      - "@group(sources)"
      - tests/test_routes_memory.py
      - tests/test_surreal_auth_runtime.py

  trust-control-auth-test:
    command:
      uv run pytest tests/test_auth_api_key_scopes_rest.py tests/test_routes_auth.py
      tests/test_surreal_auth_runtime.py tests/test_organization_runtime.py -v
    inputs:
      - "@group(sources)"
      - tests/test_auth_api_key_scopes_rest.py
      - tests/test_routes_auth.py
      - tests/test_surreal_auth_runtime.py
      - tests/test_organization_runtime.py

  trust-control-rest-test:
    command: uv run pytest tests/test_routes_memory.py tests/test_routes_context.py -v
    inputs:
      - "@group(sources)"
      - tests/test_routes_memory.py
      - tests/test_routes_context.py

  trust-control-mcp-test:
    command:
      uv run pytest tests/test_server_accessible_projects.py tests/test_auth_mcp_token_verifier.py
      tests/test_mcp_oauth_session_refresh.py tests/test_mcp_oauth_multi_org_selection.py -v
    inputs:
      - "@group(sources)"
      - tests/test_server_accessible_projects.py
      - tests/test_auth_mcp_token_verifier.py
      - tests/test_mcp_oauth_session_refresh.py
      - tests/test_mcp_oauth_multi_org_selection.py

  trust-control-jobs-test:
    command:
      uv run pytest tests/test_jobs_entities.py tests/test_jobs_queue.py
      tests/test_jobs_source_imports.py tests/test_routes_tasks.py tests/test_tools_manage.py
      tests/test_coordination_local.py -v
    inputs:
      - "@group(sources)"
      - tests/test_jobs_entities.py
      - tests/test_jobs_queue.py
      - tests/test_jobs_source_imports.py
      - tests/test_routes_tasks.py
      - tests/test_tools_manage.py
      - tests/test_coordination_local.py

  autonomy-test:
    command:
      uv run pytest
      tests/test_routes_memory.py::test_auto_review_reflection_candidate_promotes_safe_candidate
      tests/test_routes_memory.py::test_auto_review_reflection_candidate_dry_run_does_not_promote
      tests/test_routes_memory.py::test_auto_review_reflection_candidate_routes_exceptions -v
    inputs:
      - "@group(sources)"
      - tests/test_routes_memory.py

  reflection-quality-test:
    command:
      uv run pytest tests/test_routes_context.py::TestReflectRoute tests/test_jobs_reflection.py
      tests/test_routes_memory.py::test_preview_reflection_promotion_verifies_project_target
      tests/test_routes_memory.py::test_auto_review_reflection_candidate_promotes_safe_candidate
      tests/test_routes_memory.py::test_auto_review_reflection_candidate_dry_run_does_not_promote
      tests/test_routes_memory.py::test_auto_review_reflection_candidate_routes_exceptions
      tests/test_routes_memory.py::test_drain_reflection_review_dry_run_summarizes_pending_candidates
      tests/test_routes_memory.py::test_drain_reflection_review_archives_terminal_exceptions
      tests/test_routes_memory.py::test_inspect_memory_source_returns_metadata_and_visible_content
      tests/test_routes_memory.py::test_apply_memory_correction_returns_updated_review_state
      tests/test_routes_memory.py::test_promote_reflection_candidate_verifies_project_target
      tests/test_routes_memory.py::test_promote_reflection_candidate_returns_policy_denial -v
    inputs:
      - "@group(sources)"
      - tests/test_jobs_reflection.py
      - tests/test_routes_context.py
      - tests/test_routes_memory.py

  auth-session-test:
    command:
      uv run pytest tests/test_surreal_auth_runtime.py tests/test_auth_session_cache.py
      tests/test_auth_mcp_token_verifier.py tests/test_mcp_oauth_session_refresh.py
      tests/test_mcp_oauth_multi_org_selection.py tests/test_routes_auth.py
      tests/test_users_routes.py::test_revoke_all_sessions_returns_revoked_count -v
    inputs:
      - "@group(sources)"
      - tests/test_surreal_auth_runtime.py
      - tests/test_auth_session_cache.py
      - tests/test_auth_mcp_token_verifier.py
      - tests/test_mcp_oauth_session_refresh.py
      - tests/test_mcp_oauth_multi_org_selection.py
      - tests/test_routes_auth.py
      - tests/test_users_routes.py

  overview-perf-test:
    command:
      uv run pytest tests/test_routes_admin.py::test_stats_uses_graph_stats_payload
      tests/test_metrics.py::TestGetOrgMetrics::test_org_metrics_uses_surreal_metric_task_fast_path
      tests/test_metrics.py::TestGetProjectSummaries::test_project_summaries_uses_surreal_metric_task_fast_path
      -v
    inputs:
      - "@group(sources)"
      - tests/test_routes_admin.py
      - tests/test_metrics.py

  backup-restore-gate-test:
    command:
      uv run pytest tests/test_jobs_backup.py tests/test_backups_routes.py
      tests/test_surreal_auth_persistence.py::test_auth_archive_restore_accepts_full_user_rows
      tests/test_surreal_content_persistence.py::test_content_archive_restore_preserves_embeddings_and_metadata
      tests/test_surreal_content_persistence.py::test_content_archive_export_reads_from_surreal_backend
      -v
    inputs:
      - "@group(sources)"
      - tests/test_jobs_backup.py
      - tests/test_backups_routes.py
      - tests/test_surreal_auth_persistence.py
      - tests/test_surreal_content_persistence.py

  memory-trust-context-test:
    command: uv run pytest tests/test_routes_context.py tests/test_routes_session.py -v
    inputs:
      - "@group(sources)"
      - tests/test_routes_context.py
      - tests/test_routes_session.py

  context-quality-test:
    command:
      uv run pytest tests/test_routes_context.py tests/test_routes_session.py
      tests/test_server_accessible_projects.py::test_compile_mcp_context_pack_audits_render_receipt
      -v
    inputs:
      - "@group(sources)"
      - tests/test_routes_context.py
      - tests/test_routes_session.py
      - tests/test_server_accessible_projects.py

  workspace-trust-test:
    command:
      uv run pytest tests/test_routes_memory.py tests/test_jobs_source_imports.py
      tests/test_routes_jobs.py -v
    inputs:
      - "@group(sources)"
      - tests/test_routes_memory.py
      - tests/test_jobs_source_imports.py
      - tests/test_routes_jobs.py

  memory-trust-mcp-test:
    command:
      uv run pytest tests/test_server_accessible_projects.py tests/test_auth_mcp_token_verifier.py
      tests/test_mcp_oauth_session_refresh.py tests/test_mcp_oauth_multi_org_selection.py -v
    inputs:
      - "@group(sources)"
      - tests/test_server_accessible_projects.py
      - tests/test_auth_mcp_token_verifier.py
      - tests/test_mcp_oauth_session_refresh.py
      - tests/test_mcp_oauth_multi_org_selection.py

  memory-trust-jobs-test:
    command:
      uv run pytest tests/test_jobs_entities.py tests/test_jobs_queue.py
      tests/test_jobs_reflection.py tests/test_routes_jobs.py tests/test_routes_tasks.py
      tests/test_tools_manage.py tests/test_coordination_local.py -v
    inputs:
      - "@group(sources)"
      - tests/test_jobs_entities.py
      - tests/test_jobs_queue.py
      - tests/test_jobs_reflection.py
      - tests/test_routes_jobs.py
      - tests/test_routes_tasks.py
      - tests/test_tools_manage.py
      - tests/test_coordination_local.py

  test-cov:
    command: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    outputs:
      - coverage.xml

  check:
    deps:
      - ~:lint
      - ~:typecheck
      - ~:test

  # Live SurrealDB runtime tests (requires the CI SurrealDB service)
  test-live:
    command: SIBYL_LIVE_SURREAL_TESTS=1 uv run pytest tests/test_surreal_live_runtime.py --no-cov -v
    inputs:
      - "@group(sources)"
      - tests/test_surreal_live_runtime.py
    options:
      cache: false
      runInCI: true

  # Server
  serve:
    command: uv run sibyld serve
    preset: server
    options:
      persistent: true

  # Worker
  worker:
    command: uv run sibyld worker
    preset: server
    options:
      persistent: true

  # Dependencies
  sync:
    command: uv sync
    inputs:
      - pyproject.toml
      - /uv.lock

  # Build
  build:
    command: uv build
    inputs:
      - "@group(sources)"
      - "@group(configs)"

  # Installation
  install:
    command: uv tool install . --force

  install-dev:
    command: uv tool install . --editable --force
