# https://moonrepo.dev/docs/config/project
$schema: https://moonrepo.dev/schemas/project.json

language: python
layer: application
toolchains:
  default: system

fileGroups:
  sources:
    - src/**/*
  tests:
    - tests/**/*
  configs:
    - pyproject.toml

tasks:
  # Linting & Formatting
  lint:
    command: uv run ruff check src tests
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - "@group(configs)"

  format:
    command: uv run ruff format src tests
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    preset: server

  fix:
    script: uv run ruff check --fix src tests && uv run ruff format src tests
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    preset: server

  fix-all:
    script: uv run ruff check --fix --unsafe-fixes src tests && uv run ruff format src tests
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    preset: server

  # Type Checking
  typecheck:
    command: uv run ty check
    inputs:
      - "@group(sources)"
      - "@group(configs)"

  # Testing (unit tests only - e2e tests are in apps/e2e)
  test:
    command: uv run pytest
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    options:
      envFile: .env

  memory-trust-rest-test:
    command: uv run pytest tests/test_routes_memory.py tests/test_surreal_auth_runtime.py -v
    inputs:
      - "@group(sources)"
      - tests/test_routes_memory.py
      - tests/test_surreal_auth_runtime.py
    options:
      envFile: .env

  memory-trust-context-test:
    command: uv run pytest tests/test_routes_context.py tests/test_routes_session.py -v
    inputs:
      - "@group(sources)"
      - tests/test_routes_context.py
      - tests/test_routes_session.py
    options:
      envFile: .env

  memory-trust-mcp-test:
    command:
      uv run pytest tests/test_server_accessible_projects.py
      tests/test_auth_mcp_token_verifier.py tests/test_mcp_oauth_session_refresh.py
      tests/test_mcp_oauth_multi_org_selection.py -v
    inputs:
      - "@group(sources)"
      - tests/test_server_accessible_projects.py
      - tests/test_auth_mcp_token_verifier.py
      - tests/test_mcp_oauth_session_refresh.py
      - tests/test_mcp_oauth_multi_org_selection.py
    options:
      envFile: .env

  test-cov:
    command: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml
    inputs:
      - "@group(sources)"
      - "@group(tests)"
    outputs:
      - coverage.xml
    options:
      envFile: .env

  check:
    deps:
      - ~:lint
      - ~:typecheck
      - ~:test

  # Live SurrealDB runtime tests (requires the CI SurrealDB service)
  test-live:
    command: SIBYL_LIVE_SURREAL_TESTS=1 uv run pytest tests/test_surreal_live_runtime.py --no-cov -v
    inputs:
      - "@group(sources)"
      - tests/test_surreal_live_runtime.py
    options:
      cache: false
      envFile: .env
      runInCI: true

  # Server
  serve:
    command: uv run sibyld serve
    preset: server
    options:
      envFile: .env
      persistent: true

  # Worker
  worker:
    command: uv run sibyld worker
    preset: server
    options:
      envFile: .env
      persistent: true

  # Dependencies
  sync:
    command: uv sync
    inputs:
      - pyproject.toml
      - /uv.lock

  # Build
  build:
    command: uv build
    inputs:
      - "@group(sources)"
      - "@group(configs)"

  # Installation
  install:
    command: uv tool install . --force

  install-dev:
    command: uv tool install . --editable --force
