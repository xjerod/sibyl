{{- if eq .Values.coordinationBackend "redis" }}
{{- if not .Values.backend.redis.existingSecret }}
{{- if not .Values.backend.redis.password }}
{{- fail "coordinationBackend=redis requires backend.redis.existingSecret or backend.redis.password" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sibyl.fullname" . }}-redis
  labels:
    {{- include "sibyl.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.backend.redis.password | b64enc | quote }}
{{- end }}
{{- end }}
