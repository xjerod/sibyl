apiVersion: v1
kind: ConfigMap
{{- include "sibyl.validateOidcProviders" . }}
{{- if hasKey .Values "store" }}
{{- fail "Deprecated value 'store' is no longer supported. Remove it and complete legacy-to-Surreal migration before upgrading." }}
{{- end }}
{{- if hasKey .Values "authStore" }}
{{- fail "Deprecated value 'authStore' is no longer supported. Remove it and complete legacy auth migration before upgrading." }}
{{- end }}
metadata:
  name: {{ include "sibyl.fullname" . }}-config
  labels:
    {{- include "sibyl.labels" . | nindent 4 }}
data:
  # Backend configuration
  {{- range $key, $value := .Values.backend.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  # Storage mode
  SIBYL_STORE: "surreal"
  SIBYL_AUTH_STORE: "surreal"
  SIBYL_COORDINATION_BACKEND: {{ .Values.coordinationBackend | quote }}
  SIBYL_LOCAL_AUTH_ENABLED: {{ .Values.breakGlass.enabled | quote }}
  SIBYL_BREAK_GLASS_ENABLED: {{ .Values.breakGlass.enabled | quote }}
  SIBYL_BREAK_GLASS_ALLOWED_IPS: {{ .Values.breakGlass.allowedIPs | toJson | quote }}
  {{- if .Values.breakGlass.expiresAt }}
  SIBYL_BREAK_GLASS_EXPIRES_AT: {{ .Values.breakGlass.expiresAt | quote }}
  {{- end }}
  SIBYL_OIDC: {{ .Values.oidc | toJson | quote }}
  {{- if eq .Values.coordinationBackend "redis" }}
  SIBYL_REDIS_HOST: {{ .Values.backend.redis.host | quote }}
  SIBYL_REDIS_PORT: {{ .Values.backend.redis.port | quote }}
  SIBYL_REDIS_JOBS_DB: {{ .Values.backend.redis.jobsDb | quote }}
  {{- if .Values.backend.redis.rateLimitStorage }}
  SIBYL_RATE_LIMIT_STORAGE: {{ .Values.backend.redis.rateLimitStorage | quote }}
  {{- else }}
  SIBYL_RATE_LIMIT_STORAGE: {{ printf "redis://%s:%s/%s" .Values.backend.redis.host .Values.backend.redis.port .Values.backend.redis.rateLimitDb | quote }}
  {{- end }}
  {{- end }}
  # SurrealDB connection
  SIBYL_SURREAL_URL: {{ .Values.backend.surreal.url | quote }}
  SIBYL_SURREAL_USERNAME: {{ .Values.backend.surreal.username | quote }}
  SIBYL_SURREAL_NAMESPACE_PREFIX: {{ .Values.backend.surreal.namespacePrefix | quote }}
  SIBYL_SURREAL_DATABASE: {{ .Values.backend.surreal.database | quote }}
