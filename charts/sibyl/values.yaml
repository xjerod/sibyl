# Sibyl Helm Chart Values
# This chart deploys the Sibyl application (backend + frontend + worker).
# It does NOT include infrastructure (SurrealDB, Valkey/Redis, Kong).
# Those should be deployed separately using their respective charts.

# -- Global settings
global:
  # -- Image pull secrets for private registries
  imagePullSecrets: []

# -- Storage mode configuration.
# Sibyl's active Helm runtime is fully SurrealDB-backed.
# Archive and legacy migration sidecars are operated outside this release chart.
# -- Coordination backend: "auto", "local", or "redis"
coordinationBackend: "auto"

# -- Authentication defaults. Local username/password auth is the default simple path; enterprise
# SSO values can disable it explicitly after OIDC is configured.
auth:
  # -- Enable local username/password login outside setup and break-glass flows.
  localAuthEnabled: true
  # -- Allow public self-serve account creation after initial setup.
  publicSignupsEnabled: false

# -- OpenID Connect configuration passed to SIBYL_OIDC.
oidc:
  # -- Corporate OIDC providers. GitHub/Google require extra_providers_enabled=true.
  providers: []
  # Example:
  # providers:
  #   - name: entra
  #     issuer: "https://login.microsoftonline.com/<tenant-id>/v2.0"
  #     client_id: ""
  #     client_secret_env: "SIBYL_OIDC_ENTRA_CLIENT_SECRET"
  #     scopes: ["openid", "profile", "email"]
  #     role_claim_override: ""
  # -- Global role claim, supports dotted paths such as "resource_access.sibyl.roles".
  role_claim: "roles"
  # -- OIDC-backed session lifetime in minutes.
  session_minutes: 60
  # -- Enable silent refresh against the IdP.
  silent_refresh_enabled: false
  # -- Explicit opt-in for non-corporate providers such as GitHub or Google.
  extra_providers_enabled: false

# -- Backend configuration
backend:
  # -- Number of replicas (ignored if autoscaling is enabled)
  replicaCount: 1

  image:
    # -- Backend image repository
    repository: ghcr.io/hyperb1iss/sibyl-api
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag (defaults to chart appVersion)
    tag: ""

  # -- Service configuration
  service:
    type: ClusterIP
    port: 3334
    # -- Service annotations
    annotations: {}
    # -- Session affinity for MCP stateful connections
    # Set to "ClientIP" to enable sticky sessions (recommended for multi-replica)
    sessionAffinity: ""
    # -- Session affinity config (only used if sessionAffinity is set)
    sessionAffinityConfig:
      clientIP:
        timeoutSeconds: 10800 # 3 hours

  # -- Autoscaling configuration
  autoscaling:
    # -- Enable horizontal pod autoscaler
    enabled: false
    # -- Minimum replicas
    minReplicas: 2
    # -- Maximum replicas
    maxReplicas: 10
    # -- Target CPU utilization percentage
    targetCPUUtilizationPercentage: 70
    # -- Target memory utilization percentage
    targetMemoryUtilizationPercentage: 80
    # -- Scaling behavior configuration
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 4
            periodSeconds: 15
        selectPolicy: Max

  # -- Pod disruption budget
  pdb:
    # -- Enable PDB
    enabled: false
    # -- Minimum available pods (mutually exclusive with maxUnavailable)
    minAvailable: 1
    # -- Maximum unavailable pods
    # maxUnavailable: 1

  # -- Pod anti-affinity configuration
  podAntiAffinity:
    # -- Enable pod anti-affinity (spreads pods across nodes)
    enabled: false
    # -- Anti-affinity type: "soft" (preferred) or "hard" (required)
    type: soft
    # -- Topology key for anti-affinity
    topologyKey: kubernetes.io/hostname

  # -- Resource limits and requests
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 60
    periodSeconds: 30

  # -- Readiness probe configuration
  # Readiness gates traffic on serving dependencies (SurrealDB reachability),
  # unlike liveness which only asserts the process is up. Must hit the deep
  # readiness endpoint, not /api/health.
  readinessProbe:
    httpGet:
      path: /api/health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

  # -- Environment variables (non-secret)
  env:
    SIBYL_SERVER_HOST: "0.0.0.0"
    SIBYL_SERVER_PORT: "3334"
    SIBYL_ENVIRONMENT: "production"
    SIBYL_LLM_PROVIDER: "anthropic"
    SIBYL_LLM_MODEL: "claude-haiku-4-5"
    SIBYL_EMBEDDING_MODEL: "text-embedding-3-small"
    SIBYL_EMBEDDING_DIMENSIONS: "1536"
    OPENBLAS_NUM_THREADS: "1"
    OMP_NUM_THREADS: "1"
    MKL_NUM_THREADS: "1"
    NUMEXPR_NUM_THREADS: "1"

  # -- Reference to existing secret for sensitive env vars
  # Must contain: SIBYL_JWT_SECRET, SIBYL_OPENAI_API_KEY, SIBYL_ANTHROPIC_API_KEY
  existingSecret: ""

  # -- SurrealDB connection settings
  surreal:
    # -- SurrealDB connection URL (ws:// or http:// to an external Surreal instance)
    url: "ws://surrealdb:8000/rpc"
    # -- Root username
    username: "root"
    # -- Reference to existing secret containing SIBYL_SURREAL_PASSWORD
    # When empty, a password is auto-generated and stored in `<release>-surreal`.
    existingSecret: ""
    # -- Secret key containing the password (only used if existingSecret is set)
    secretKey: "password"
    # -- Inline password (ignored when existingSecret is set; auto-generated otherwise)
    password: ""
    # -- Namespace prefix for org isolation (e.g., "org_" → "org_<uuid_hex>")
    namespacePrefix: "org_"
    # -- Database name inside each org namespace
    database: "graph"

  # -- Redis/Valkey connection settings (used when coordinationBackend is "redis")
  redis:
    # -- Redis/Valkey host
    host: "valkey"
    # -- Redis/Valkey port
    port: "6379"
    # -- Redis database number for arq job queue
    jobsDb: "1"
    # -- Redis database number for API rate limits
    rateLimitDb: "4"
    # -- Reference to secret containing Redis/Valkey password
    existingSecret: ""
    # -- Secret key containing the password
    secretKey: "password"
    # -- Inline password (not recommended; prefer existingSecret)
    password: ""
    # -- Shared rate-limit storage URL. Leave empty to derive a redis:// URL from host/port/rateLimitDb.
    rateLimitStorage: ""

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # -- Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity rules (overridden by podAntiAffinity if enabled)
  affinity: {}

# -- Frontend configuration
frontend:
  # -- Enable frontend deployment
  enabled: true

  # -- Number of replicas (ignored if autoscaling is enabled)
  replicaCount: 1

  image:
    # -- Frontend image repository
    repository: ghcr.io/hyperb1iss/sibyl-web
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag (defaults to chart appVersion)
    tag: ""

  # -- Service configuration
  service:
    type: ClusterIP
    port: 3337

  # -- Autoscaling configuration
  autoscaling:
    # -- Enable horizontal pod autoscaler
    enabled: false
    # -- Minimum replicas
    minReplicas: 2
    # -- Maximum replicas
    maxReplicas: 10
    # -- Target CPU utilization percentage
    targetCPUUtilizationPercentage: 70
    # -- Target memory utilization percentage
    targetMemoryUtilizationPercentage: 80
    # -- Scaling behavior configuration
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60

  # -- Pod disruption budget
  pdb:
    # -- Enable PDB
    enabled: false
    # -- Minimum available pods
    minAvailable: 1

  # -- Pod anti-affinity configuration
  podAntiAffinity:
    # -- Enable pod anti-affinity
    enabled: false
    # -- Anti-affinity type: "soft" or "hard"
    type: soft
    # -- Topology key
    topologyKey: kubernetes.io/hostname

  # -- Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

  # -- Liveness probe configuration
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30

  # -- Readiness probe configuration
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

  # -- Environment variables
  env:
    NODE_ENV: "production"
    NEXT_TELEMETRY_DISABLED: "1"

  # -- Server-side API URL for Next.js server components.
  # Defaults to http://<release>-backend:<backend.service.port>/api when empty.
  apiUrl: ""

  # -- Optional browser-visible API URL. Leave empty for same-origin ingress.
  publicApiUrl: ""

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # -- Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false # Next.js needs write access
    capabilities:
      drop:
        - ALL

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity rules (overridden by podAntiAffinity if enabled)
  affinity: {}

# -- Worker configuration (arq job queue processor)
worker:
  # -- Enable worker deployment
  enabled: true

  # -- Number of replicas (ignored if autoscaling is enabled)
  replicaCount: 1

  # -- Autoscaling configuration
  autoscaling:
    # -- Enable horizontal pod autoscaler
    enabled: false
    # -- Minimum replicas
    minReplicas: 1
    # -- Maximum replicas
    maxReplicas: 5
    # -- Target CPU utilization percentage
    targetCPUUtilizationPercentage: 70
    # -- Target memory utilization percentage
    targetMemoryUtilizationPercentage: 80
    # -- Scaling behavior configuration
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60

  # -- Pod disruption budget
  pdb:
    # -- Enable PDB
    enabled: false
    # -- Minimum available pods
    minAvailable: 1

  # -- Pod anti-affinity configuration
  podAntiAffinity:
    # -- Enable pod anti-affinity
    enabled: false
    # -- Anti-affinity type: "soft" or "hard"
    type: soft
    # -- Topology key
    topologyKey: kubernetes.io/hostname

  # -- Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # -- Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity rules (overridden by podAntiAffinity if enabled)
  affinity: {}

# -- Ingress configuration.
ingress:
  # -- Shared route table for classic Ingress and Gateway API HTTPRoute.
  hosts:
    - host: sibyl.local
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /mcp
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  classic:
    # -- Enable networking.k8s.io/v1 Ingress rendering.
    enabled: false
    # -- Ingress class name. Empty leaves controller selection to cluster policy.
    className: ""
    # -- Ingress annotations.
    annotations: {}
    # -- TLS configuration.
    tls: []
  gatewayApi:
    # -- Enable gateway.networking.k8s.io/v1 HTTPRoute rendering.
    enabled: false
    # -- HTTPRoute annotations.
    annotations: {}
    # -- Parent Gateway references.
    parentRefs: []
    # Example:
    # parentRefs:
    #   - name: shared-gateway
    #     namespace: gateway-system
    #     sectionName: https
    # -- Optional hostnames override. Defaults to ingress.hosts[*].host.
    hostnames: []

# -- Kubernetes NetworkPolicy configuration.
networkPolicy:
  # -- Enable default-deny plus explicit app allows.
  enabled: false
  ingress:
    # -- Sources allowed to reach frontend/backend services, usually ingress controller pods.
    from: []
    # Example:
    # from:
    #   - namespaceSelector:
    #       matchLabels:
    #         kubernetes.io/metadata.name: ingress-nginx
  egress:
    # -- Allow DNS egress for selected Sibyl pods.
    allowDns: true
    dnsPorts:
      - 53
    # -- Extra egress rules appended to backend/worker policies.
    extra: []
  surrealdb:
    # -- Destination selectors for the SurrealDB service/pods.
    to: []
    ports:
      - 8000
  redis:
    # -- Enable Redis/Valkey egress allow rules.
    enabled: false
    to: []
    ports:
      - 6379

# -- Namespace Pod Security labels.
podSecurity:
  # -- Label the release namespace with Pod Security restricted enforce/audit/warn.
  enforceRestricted: false
  version: "latest"

# -- Post-install/post-upgrade tenant bootstrap.
bootstrap:
  enabled: false
  organization:
    name: "Sibyl"
    slug: ""
  memorySpace:
    enabled: true
    name: "Default memory"
    scope: "private"
    scopeKey: ""
  job:
    annotations: {}
    backoffLimit: 3
    ttlSecondsAfterFinished: 300
    podAnnotations: {}

# -- Break-glass local owner bootstrap.
breakGlass:
  enabled: false
  # -- Source CIDRs allowed to use break-glass login when enabled.
  allowedIPs: []
  # -- UTC timestamp after which app-level break-glass login is denied.
  expiresAt: ""
  # -- Existing secret containing owner bootstrap fields.
  existingSecret: ""
  ownerEmailKey: "owner-email"
  ownerPasswordKey: "owner-password"

# -- Service account configuration
serviceAccount:
  # -- Create service account
  create: true
  # -- Service account name
  name: ""
  # -- Service account annotations
  annotations: {}
