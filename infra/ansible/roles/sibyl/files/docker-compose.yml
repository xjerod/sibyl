# Sibyl single-host deployment stack: ghcr.io images fronted by Caddy,
# which terminates TLS with a Let's Encrypt cert via the Cloudflare
# DNS-01 challenge. Rendered config lives in the sibling .env. Managed
# by the Ansible `sibyl` role and sibyl.service; not run by hand.

name: sibyl

services:
  # The SurrealDB image runs as UID 65532 (distroless nonroot), but a
  # fresh named volume is created root-owned, so SurrealDB cannot create
  # its RocksDB directory under /data. This one-shot fixes the volume
  # ownership before SurrealDB starts; the chown is idempotent on reruns.
  surreal-init:
    image: busybox:1.37
    container_name: sibyl-surreal-init
    command: ["chown", "-R", "65532:65532", "/data"]
    volumes:
      - surreal_data:/data
    restart: "no"

  surrealdb:
    image: ${SIBYL_SURREAL_IMAGE:-surrealdb/surrealdb:v3.1.0}
    container_name: sibyl-surrealdb
    depends_on:
      surreal-init:
        condition: service_completed_successfully
    command:
      - start
      - --log
      - info
      - --user
      - ${SIBYL_SURREAL_USERNAME:-root}
      - --pass
      - ${SIBYL_SURREAL_PASSWORD:?set SIBYL_SURREAL_PASSWORD in the role env file}
      - rocksdb:///data/sibyl.db
    volumes:
      - surreal_data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "ws://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/hyperb1iss/sibyl-api:${SIBYL_VERSION:-0.9.0}
    container_name: sibyl-backend
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      SIBYL_ENVIRONMENT: production
      SIBYL_STORE: surreal
      SIBYL_AUTH_STORE: surreal
      SIBYL_COORDINATION_BACKEND: auto
      SIBYL_SURREAL_URL: ws://surrealdb:8000/rpc
      SIBYL_SURREAL_USERNAME: ${SIBYL_SURREAL_USERNAME:-root}
      SIBYL_SURREAL_PASSWORD:
        ${SIBYL_SURREAL_PASSWORD:?set SIBYL_SURREAL_PASSWORD in the role env file}
      SIBYL_JWT_SECRET: ${SIBYL_JWT_SECRET:?set SIBYL_JWT_SECRET in the role env file}
      SIBYL_SERVER_URL: https://${SIBYL_DOMAIN:?set SIBYL_DOMAIN in the role env file}
      SIBYL_FRONTEND_URL: https://${SIBYL_DOMAIN}/
      SIBYL_OPENAI_API_KEY: ${SIBYL_OPENAI_API_KEY:?set SIBYL_OPENAI_API_KEY in the role env file}
      SIBYL_ANTHROPIC_API_KEY:
        ${SIBYL_ANTHROPIC_API_KEY:?set SIBYL_ANTHROPIC_API_KEY in the role env file}
      SIBYL_LLM_PROVIDER: anthropic
      SIBYL_LLM_MODEL: claude-haiku-4-5
      SIBYL_LOCAL_AUTH_ENABLED: ${SIBYL_LOCAL_AUTH_ENABLED:-true}
      SIBYL_PUBLIC_SIGNUPS_ENABLED: ${SIBYL_PUBLIC_SIGNUPS_ENABLED:-false}
      SIBYL_BREAK_GLASS_ENABLED: ${SIBYL_BREAK_GLASS_ENABLED:-false}
      SIBYL_MCP_AUTH_MODE: ${SIBYL_MCP_AUTH_MODE:-auto}
      SIBYL_COOKIE_DOMAIN: ${SIBYL_DOMAIN}
      SIBYL_COOKIE_SECURE: "true"
      SIBYL_SERVER_HOST: 0.0.0.0
      SIBYL_SERVER_PORT: "3334"
    healthcheck:
      test:
        ["CMD-SHELL", 'python -c "import httpx; httpx.get(''http://localhost:3334/api/health'')"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    image: ghcr.io/hyperb1iss/sibyl-web:${SIBYL_VERSION:-0.9.0}
    container_name: sibyl-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://${SIBYL_DOMAIN:?set SIBYL_DOMAIN in the role env file}
      SIBYL_API_URL: http://backend:3334/api
      SIBYL_BACKEND_URL: http://backend:3334
      NODE_ENV: production
      # Next.js standalone binds 0.0.0.0 (IPv4 only) by default; :: makes
      # the server dual-stack so it answers on both ::1 and 127.0.0.1.
      HOSTNAME: "::"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3337/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  caddy:
    build:
      context: ./caddy
    container_name: sibyl-caddy
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    # Bound to the Tailscale address only. Docker NATs published ports
    # ahead of ufw, so a 0.0.0.0 bind would be public despite the
    # firewall; binding to the tailnet IP is what keeps this private.
    ports:
      - "${SIBYL_BIND_IP:?set SIBYL_BIND_IP in the role env file}:80:80"
      - "${SIBYL_BIND_IP}:443:443"
    environment:
      SIBYL_DOMAIN: ${SIBYL_DOMAIN:?set SIBYL_DOMAIN in the role env file}
      CF_API_TOKEN: ${CF_API_TOKEN:?set CF_API_TOKEN in the role env file}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  surreal_data:
  caddy_data:
  caddy_config:

networks:
  default:
    name: sibyl-network
