# SurrealDB official Helm chart values for local Tilt.
# TiKV stores the data; SurrealDB pods are stateless query/API workers.

replicaCount: 2

surrealdb:
  path: "tikv://sibyl-tikv-pd:2379"
  log: info
  initial_user: root
  unauthenticated: false

podExtraEnv:
  - name: SURREAL_PASS
    valueFrom:
      secretKeyRef:
        name: sibyl-secrets
        key: SIBYL_SURREAL_PASSWORD

strategy:
  type: RollingUpdate

persistence:
  enabled: false

service:
  type: ClusterIP
  port: 8000
  targetPort: http

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi
