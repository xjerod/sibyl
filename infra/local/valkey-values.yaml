# Official valkey-io/valkey-helm values for Sibyl coordination.
# Valkey backs arq jobs, distributed locks, WebSocket pub/sub, and rate limits.

replica:
  enabled: true
  replicas: 2
  persistence:
    size: 1Gi
  minReplicasToWrite: 1
  minReplicasMaxLag: 10

auth:
  enabled: true
  usersExistingSecret: sibyl-secrets
  aclUsers:
    default:
      permissions: "~* &* +@all"
      passwordKey: SIBYL_REDIS_PASSWORD

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
