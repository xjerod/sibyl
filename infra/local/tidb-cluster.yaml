# Mini TiKV cluster for SurrealDB's distributed datastore.
# This follows PingCAP's basic TidbCluster shape, but disables TiDB SQL pods.

apiVersion: pingcap.com/v1alpha1
kind: TidbCluster
metadata:
  name: sibyl-tikv
  namespace: sibyl
spec:
  version: v8.5.5
  timezone: UTC
  pvReclaimPolicy: Retain
  enableDynamicConfiguration: true
  configUpdateStrategy: RollingUpdate
  discovery: {}
  helper:
    image: alpine:3.16.0
  pd:
    baseImage: pingcap/pd
    maxFailoverCount: 0
    replicas: 3
    storageClassName: standard
    requests:
      storage: 1Gi
    config: {}
  tikv:
    baseImage: pingcap/tikv
    maxFailoverCount: 0
    replicas: 3
    storageClassName: standard
    requests:
      storage: 2Gi
    config:
      storage:
        reserve-space: 0MB
      rocksdb:
        max-open-files: 256
      raftdb:
        max-open-files: 256
