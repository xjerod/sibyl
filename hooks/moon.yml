$schema: https://moonrepo.dev/schemas/project.json
language: python
toolchains:
  default: system
tasks:
  lint:
    script: uv run ruff check . && uv run ruff format --check .
    inputs:
    - '@group(sources)'
    - '@group(configs)'
  format:
    command: uv run ruff format .
    inputs:
    - '@group(sources)'
    preset: server
  fix:
    script: uv run ruff check --fix . && uv run ruff format .
    inputs:
    - '@group(sources)'
    preset: server
  typecheck:
    command: uv run ty check .
    inputs:
    - '@group(sources)'
    - '@group(configs)'
  check:
    command: noop
    deps:
    - ~:lint
    - ~:typecheck
  install:
    options:
      shell: true
    # `cp ./*.py ~/.claude/hooks/sibyl/` blows up when the dest is a symlink
    # back to the source (the dev-mode pattern: edit source → hook updates
    # live). Skip files that already resolve to the same inode so re-running
    # install is idempotent and preserves dev symlinks.
    script: |
      echo 'Installing Claude Code hooks...'
      mkdir -p ~/.claude/hooks/sibyl
      for f in ./*.py; do
        dest="$HOME/.claude/hooks/sibyl/$(basename "$f")"
        if [[ -e "$dest" ]] && [[ "$(readlink -f "$f")" = "$(readlink -f "$dest")" ]]; then
          continue
        fi
        cp -f "$f" "$dest"
      done
      chmod +x ~/.claude/hooks/sibyl/*.py
      python3 configure.py
      echo '✓ Hooks installed - restart Claude Code to activate'
    preset: server
  uninstall:
    options:
      shell: true
    script: rm -rf ~/.claude/hooks/sibyl && echo '✓ Removed Sibyl hooks (settings.json unchanged - edit manually if needed)'
    preset: server
fileGroups:
  sources:
  - '*.py'
  configs:
  - pyproject.toml
  - /pyproject.toml
  - moon.yml
layer: tool
