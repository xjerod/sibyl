# Sibyl Development Data Services
#
# To run multiple instances, use different project names and ports:
#   COMPOSE_PROJECT_NAME=sibyl-test SIBYL_SURREAL_PORT=8010 docker compose up -d surrealdb
#   COMPOSE_PROJECT_NAME=sibyl-redis SIBYL_REDIS_PORT=6391 docker compose --profile redis up -d surrealdb redis
#
# Or use a separate env file:
#   docker compose --env-file .env.test up -d

services:
  surrealdb:
    image: ${SIBYL_SURREAL_IMAGE:-surrealdb/surrealdb:v3.0.5}
    container_name: ${COMPOSE_PROJECT_NAME:-sibyl}-surrealdb
    command:
      [
        "start",
        "--log",
        "${SIBYL_SURREAL_LOG_LEVEL:-info}",
        "--user",
        "${SIBYL_SURREAL_USERNAME:-root}",
        "--pass",
        "${SIBYL_SURREAL_PASSWORD:-root}",
        "${SIBYL_SURREAL_PATH:-rocksdb:///data/sibyl.db}",
      ]
    ports:
      - "${SIBYL_SURREAL_PORT:-8000}:8000"
    volumes:
      # `:U` is a podman extension that chowns the bind mount to the container UID
      # on first start (no-op under Docker Engine). Fixes rootless podman perm denied.
      - "${SURREAL_DATA_DIR:-./.moon/cache/surreal-dev}:/data:U"
    restart: unless-stopped

  redis:
    image: valkey/valkey:8-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-sibyl}-redis
    profiles: ["redis"]
    ports:
      - "${SIBYL_REDIS_PORT:-6381}:6379"
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg18
    container_name: ${COMPOSE_PROJECT_NAME:-sibyl}-postgres
    profiles: ["migration"]
    ports:
      - "${SIBYL_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${SIBYL_POSTGRES_USER:-sibyl}
      POSTGRES_PASSWORD: ${SIBYL_POSTGRES_PASSWORD:-sibyl_dev}
      POSTGRES_DB: ${SIBYL_POSTGRES_DB:-sibyl}
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${SIBYL_POSTGRES_USER:-sibyl} -d ${SIBYL_POSTGRES_DB:-sibyl}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
